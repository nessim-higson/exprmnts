<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Nav, Rebuilt · exprmnts</title>
<style>
  :root{ --ink:#000; --white:#ece9e3; --mute:#96948c; --faint:#5a5852;
         --hairline:#26251f; --crimson:#e03a30 }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{background:var(--ink); color:var(--white); overflow:hidden;
    font:15px/1.4 "Helvetica Neue",-apple-system,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  canvas{position:fixed; inset:0; display:block; width:100%; height:100%}

  .crumb{position:fixed; top:22px; left:26px; z-index:5; color:var(--faint);
    font-size:11px; font-weight:600; letter-spacing:.22em; text-transform:uppercase}
  .crumb a{color:var(--faint); text-decoration:none}
  .crumb a:hover{color:var(--white)}

  /* ------- the text nav ------- */
  #nav{position:fixed; z-index:4; left:13vw; top:50%; transform:translateY(-62%); user-select:none}
  #logo{font-size:30px; font-weight:400; letter-spacing:.42em; color:#8f8d86; margin-bottom:14px}
  #logo sup{font-size:10px; letter-spacing:0}
  .items{display:flex; flex-direction:column; align-items:flex-end; gap:2px; width:230px}
  .item{font-size:15px; font-weight:700; letter-spacing:.02em; color:#8f8d86; cursor:pointer;
    display:flex}
  .item span{display:inline-block; white-space:pre}
  .item:hover{color:var(--white)}
  .item.red{color:var(--crimson)}
  .item.red:hover{color:#ff6a60}
  .item.open{color:var(--white)}

  #sub{position:absolute; left:258px; top:44px; display:none; flex-direction:column; gap:1px}
  #sub.on{display:flex}
  .sitem{font-size:26px; font-weight:700; letter-spacing:-.01em; color:#b9b6ae; cursor:pointer;
    white-space:nowrap; opacity:0; will-change:transform,opacity}
  .sitem:hover{color:#fff}
  .sitem.sel{color:var(--crimson)}

  /* ------- control strip ------- */
  #ctl{position:fixed; right:22px; bottom:20px; z-index:6; display:flex; align-items:center; gap:18px;
    padding:12px 16px; border:1px solid var(--hairline); background:rgba(0,0,0,.72);
    font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  #ctl .seg{display:flex; border:1px solid var(--hairline)}
  #ctl .seg b{padding:7px 12px; cursor:pointer; font-weight:700; color:var(--faint)}
  #ctl .seg b.on{background:var(--white); color:#000}
  #ctl label{display:flex; align-items:center; gap:8px}
  #ctl input[type=range]{width:82px; accent-color:#ece9e3; height:2px}
  #ctl .val{min-width:26px; color:var(--mute); font-variant-numeric:tabular-nums}

  footer{position:fixed; left:26px; bottom:22px; z-index:5; color:var(--faint); font-size:10px;
    letter-spacing:.2em; text-transform:uppercase}
  @media(max-width:820px){
    #nav{left:8vw} #sub{left:0; top:190px}
    #ctl{right:12px; bottom:64px; flex-wrap:wrap; max-width:70vw}
  }
</style>
</head>
<body>
<canvas id="field"></canvas>

<div class="crumb"><a href="/">exprmnts</a> &nbsp;/&nbsp; 002 · text nav, rebuilt</div>

<nav id="nav">
  <div id="logo">firstborn<sup>®</sup></div>
  <div class="items" id="items">
    <div class="item" data-w="WHO WE ARE"></div>
    <div class="item" data-w="WHAT WE DO"></div>
    <div class="item" data-w="HOW WE DO IT"></div>
    <div class="item" data-w="OUR PORTFOLIO" data-sub="1"></div>
    <div class="item red" data-w="FIRSTBORN IS 5!"></div>
    <div class="item" data-w="CONTACT US"></div>
  </div>
  <div id="sub">
    <div class="sitem" data-layout="client">BY CLIENT (A-Z)</div>
    <div class="sitem" data-layout="chrono">BY CHRONOLOGY</div>
    <div class="sitem" data-layout="type">BY PROJECT TYPE</div>
    <div class="sitem" data-layout="media">BY DELIVERY MEDIA</div>
    <div class="sitem sel" data-layout="scatter">BY THUMBNAIL</div>
  </div>
</nav>

<div id="ctl">
  <div class="seg" id="mode">
    <b data-m="spring" class="on">Spring</b><b data-m="tween">Tween ’03</b>
  </div>
  <label>Stiff <input type="range" id="stiff" min="20" max="220" value="90"><span class="val" id="stiffV">90</span></label>
  <label>Damp <input type="range" id="damp" min="4" max="30" value="12"><span class="val" id="dampV">12</span></label>
  <label>Repel <input type="range" id="repel" min="0" max="240" value="120"><span class="val" id="repelV">120</span></label>
</div>

<footer>Firstborn ’03 nav · real mined thumbnails · physics rebuild</footer>

<script>
/* ============ setup ============ */
const IDS = ['012','014','016','018','020','022','024','026','028','030','032','034','036','038','040',
'042','044','046','048','050','052','054','056','058','060','062','064','066','070','072','074','076',
'078','080','082','084','086','088','090','092','094','096','098','100','102','104','106','108','110',
'112','114','116','118','122','124','126','128','130','132','134','136','138','146','148','150','152',
'154','156','158','160','162','164','166','170','172','174','178','184','186','188','190','196','198',
'200','202','204','206','208','212','216','218','220','222','224','226','228','230','232','234','236',
'238','240','242','244','248','250','254','256','258'];
const TW = 66, TH = 31;                       // native tile size
const cv = document.getElementById('field'), cx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize', ()=>{ resize(); layouts[curLayout](); });
resize();

/* deterministic PRNG so the scatter is stable per session */
let seed = 20031107;
const rnd = () => (seed = (seed*1664525+1013904223)>>>0, seed/4294967296);

/* ============ particles ============ */
const parts = IDS.map((id,i)=>{
  const img = new Image(); img.src = 'assets/t'+id+'.jpg';
  return { img, i, x: W/2, y: H/2, vx:0, vy:0, hx: W/2, hy: H/2, b:0.22, s:1 };
});

/* ============ home layouts (the nav drives the field) ============ */
function safeZone(x,y){ // keep clear of the menu block
  return x > 0.08*W && x < 0.36*W && y > 0.28*H && y < 0.78*H;
}
const layouts = {
  scatter(){ parts.forEach(p=>{
    let x,y,tries=0;
    do { x = 30+rnd()*(W-60); y = 60+rnd()*(H-120); tries++; } while (safeZone(x,y) && tries<40);
    p.hx=x; p.hy=y;
  });},
  client(){ grid(parts.slice().sort((a,b)=>a.i-b.i)); },
  chrono(){ grid(parts.slice().sort((a,b)=>b.i-a.i)); },
  type(){ // clusters
    const K=5, cs=[];
    for(let k=0;k<K;k++) cs.push([0.44*W+rnd()*0.48*W, 0.16*H+rnd()*0.68*H]);
    parts.forEach((p,j)=>{ const c=cs[j%K];
      const a=rnd()*Math.PI*2, r=Math.sqrt(rnd())*Math.min(W,H)*0.13;
      p.hx=c[0]+Math.cos(a)*r; p.hy=c[1]+Math.sin(a)*r; });
  },
  media(){ // horizontal bands
    const rows=4;
    parts.forEach((p,j)=>{ const r=j%rows, n=Math.ceil(parts.length/rows), k=Math.floor(j/rows);
      p.hx = 0.42*W + (k/(n-1))*0.53*W;
      p.hy = 0.22*H + r*(0.56*H/(rows-1)) + (rnd()-0.5)*8; });
  },
};
function grid(sorted){
  const cols = Math.max(6, Math.round(Math.sqrt(sorted.length*(W*0.55)/(H*0.7)/(TW/TH))));
  const rows = Math.ceil(sorted.length/cols);
  const gw = Math.min(0.55*W, cols*(TW+10)), gh = Math.min(0.72*H, rows*(TH+10));
  const x0 = 0.42*W, y0 = (H-gh)/2;
  sorted.forEach((p,j)=>{
    p.hx = x0 + (j%cols)*(gw/(cols-1||1));
    p.hy = y0 + Math.floor(j/cols)*(gh/(rows-1||1));
  });
}
let curLayout='scatter';
layouts.scatter();
parts.forEach(p=>{ p.x=p.hx; p.y=p.hy; });   // spawn settled — motion is opt-in

/* ============ physics ============ */
const P = { mode:'spring', k:90, c:12, repel:120 };
const mouse = { x:-9e3, y:-9e3 };
addEventListener('pointermove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
addEventListener('pointerleave', ()=>{ mouse.x=-9e3; mouse.y=-9e3; });

const easeOut = t => 1-Math.pow(1-t,3);
let last = performance.now();
function frame(now){
  const dt = Math.min(0.033,(now-last)/1000); last=now;
  cx.clearRect(0,0,W,H);
  const t = now/1000;
  for(const p of parts){
    // drift target: home + slow per-tile sinusoid
    const dx0 = Math.sin(t*0.35 + p.i*1.7)*7, dy0 = Math.cos(t*0.28 + p.i*2.3)*5;
    const tx = p.hx+dx0, ty = p.hy+dy0;
    if (P.mode==='spring'){
      let fx = (tx-p.x)*P.k, fy = (ty-p.y)*P.k;
      const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md=Math.hypot(mdx,mdy);
      if (md < P.repel && md>0.01){
        const f = (1-md/P.repel)*2600;
        fx += mdx/md*f; fy += mdy/md*f;
      }
      p.vx = (p.vx + fx*dt) * Math.max(0,1-P.c*dt);
      p.vy = (p.vy + fy*dt) * Math.max(0,1-P.c*dt);
      p.x += p.vx*dt; p.y += p.vy*dt;
    } else { // archival tween: pure ease toward target, no momentum, no repel
      p.x += (tx-p.x)*Math.min(1, 3.2*dt/0.6);
      p.y += (ty-p.y)*Math.min(1, 3.2*dt/0.6);
      p.vx=p.vy=0;
    }
    // proximity brightness + scale
    const md = Math.hypot(p.x-mouse.x, p.y-mouse.y);
    const near = Math.max(0, 1-md/170);
    const tb = 0.20 + easeOut(near)*0.8, ts = 1 + easeOut(near)*0.55;
    p.b += (tb-p.b)*Math.min(1,10*dt);
    p.s += (ts-p.s)*Math.min(1,10*dt);
    if (p.img.complete && p.img.naturalWidth){
      const w=TW*p.s, h=TH*p.s;
      cx.globalAlpha = p.b;
      cx.drawImage(p.img, p.x-w/2, p.y-h/2, w, h);
    }
  }
  cx.globalAlpha = 1;
  tickLetters(dt); tickSub(dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ============ menu: per-letter springs ============ */
const letterSprings = [];
document.querySelectorAll('.item').forEach(item=>{
  const word = item.dataset.w;
  const springs = [];
  [...word].forEach(ch=>{
    const s = document.createElement('span'); s.textContent = ch;
    item.appendChild(s);
    springs.push({el:s, x:0, v:0, t:0});
  });
  letterSprings.push(springs);
  item.addEventListener('pointerenter', ()=> springs.forEach((sp,j)=> setTimeout(()=> sp.t=7, j*14)));
  item.addEventListener('pointerleave', ()=> springs.forEach(sp=> sp.t=0));
});
function tickLetters(dt){
  for(const springs of letterSprings) for(const sp of springs){
    if (P.mode==='spring'){
      const f = (sp.t-sp.x)*300;
      sp.v = (sp.v+f*dt)*Math.max(0,1-14*dt);
      sp.x += sp.v*dt;
    } else {
      sp.x += (sp.t-sp.x)*Math.min(1,9*dt);
      sp.v = 0;
    }
    if (Math.abs(sp.x)>0.01 || Math.abs(sp.v)>0.01)
      sp.el.style.transform = 'translateX('+(-sp.x)+'px)';
  }
}

/* ============ submenu cascade ============ */
const sub = document.getElementById('sub');
const sitems = [...document.querySelectorAll('.sitem')].map(el=>({el, x:-46, v:0, o:0, on:false}));
let subOpen = false;
document.querySelectorAll('.item').forEach(item=>{
  item.addEventListener('pointerenter', ()=>{
    const want = !!item.dataset.sub;
    if (want && !subOpen) openSub();
    document.querySelectorAll('.item').forEach(i=>i.classList.toggle('open', i===item && want));
  });
});
document.getElementById('nav').addEventListener('pointerleave', ()=>{ /* stays open — click elsewhere closes */ });
document.body.addEventListener('click', e=>{
  if (!e.target.closest('#nav') && subOpen) closeSub();
});
function openSub(){ subOpen=true; sub.classList.add('on');
  sitems.forEach((s,j)=>{ s.x=-46; s.v=0; s.o=0; setTimeout(()=> s.on=true, j*55); }); }
function closeSub(){ subOpen=false; sitems.forEach(s=> s.on=false);
  setTimeout(()=>{ if(!subOpen) sub.classList.remove('on'); }, 320);
  document.querySelectorAll('.item').forEach(i=>i.classList.remove('open')); }
function tickSub(dt){
  for(const s of sitems){
    const tx = s.on?0:-46, to = s.on?1:0;
    if (P.mode==='spring'){
      const f=(tx-s.x)*260; s.v=(s.v+f*dt)*Math.max(0,1-12*dt); s.x+=s.v*dt;
    } else { s.x += (tx-s.x)*Math.min(1,8*dt); s.v=0; }
    s.o += (to-s.o)*Math.min(1,10*dt);
    s.el.style.transform='translateX('+s.x+'px)';
    s.el.style.opacity=s.o;
  }
}
sitems.forEach(s=>{
  s.el.addEventListener('click', ()=>{
    sitems.forEach(o=>o.el.classList.remove('sel'));
    s.el.classList.add('sel');
    curLayout = s.el.dataset.layout;
    layouts[curLayout]();
  });
});

/* ============ controls ============ */
document.querySelectorAll('#mode b').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#mode b').forEach(o=>o.classList.remove('on'));
    b.classList.add('on'); P.mode = b.dataset.m;
  });
});
const bind = (id, key) => {
  const el = document.getElementById(id), v = document.getElementById(id+'V');
  el.addEventListener('input', ()=>{ P[key]=+el.value; v.textContent=el.value; });
};
bind('stiff','k'); bind('damp','c'); bind('repel','repel');
</script>
</body>
</html>
