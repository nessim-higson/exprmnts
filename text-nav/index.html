<style>

  #nav .it b{position:absolute; font-weight:400; font-synthesis:none; font-size:28px; line-height:1;

    transition:top .35s cubic-bezier(.2,.7,.3,1); top:0}

  #sil{position:absolute; transform-origin:0 0; will-change:transform; pointer-events:none}

    font-family:'FBBody',"Helvetica Neue",Helvetica,sans-serif; color:#83817a}

  /* ------- control strip ------- */

    font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}

  #ctl .seg b.on{background:var(--white); color:#000}
  #ctl label{display:flex; align-items:center; gap:8px}
  #ctl input[type=range]{width:82px; accent-color:#ece9e3; height:2px}
  #ctl .val{min-width:26px; color:var(--mute); font-variant-numeric:tabular-nums}

  footer{position:fixed; left:26px; bottom:22px; z-index:5; color:var(--faint); font-size:10px;
    letter-spacing:.2em; text-transform:uppercase}
  @media(max-width:820px){ #ctl{right:12px; bottom:64px; flex-wrap:wrap; max-width:70vw} }

<script>
/* =====================================================================
   THE TREE — edit freely. label / red / copy / children / layout.
   Copy transcribed from the 2003 original where recoverable.
   ===================================================================== */
const TREE = [
 { label:'WHO WE ARE', cX:107, cY:169, sil:'show',
   copy:"Firstborn is a talented and imaginative interactive agency founded in New York City in 1997. Our story is one of hard work, determination and a strong desire to create the best user experiences possible. Our team specializes in producing digital, interactive designs for high-profile clients mainly in fashion, cosmetics, sports and entertainment.",
   children:[
     { label:'PRINCIPALS', cX:251, cY:215, sil:'full',
       copy:"Firstborn is owned and operated by two individuals from varying backgrounds and skill sets.\n\nMichael handles the business and Vas handles the creative. If you work with Firstborn, you can count on them to be actively involved with your project. No project leaves our office without their blessing.",
       children:[
         { label:'MICHAEL FERDMAN', cX:187, cY:194, sil:'michael', copy:"Michael is responsible for the financial matters of our company. In addition to being our President and Chief Financial Officer, Michael anchors Firstborn's sales efforts. He is often the first point of contact for those who later become our clients. Before starting Firstborn, Michael worked for 15 years in the fashion industry, owning and operating small businesses. Michael is a graduate of the University of Wisconsin. He resides in New York City." },
         { label:'VAS SLOUTCHEVSKY', cX:187, cY:194, sil:'vas', copy:"Vas is responsible for all design and development of Firstborn projects. As our Vice President and Creative Director, Vas' job is to make sure all of our work is outstanding. Vas comes from a family of artists and has been a graphic designer his entire life. He and his team have created high-profile digital designs for Calvin Klein, L'Oreal, the Beatles, Madonna, Gucci and lots of other well-known names. He also wrote a chapter and tutorial for the best-selling book \"New Masters of Flash: 2002 Annual\". Vas is a graduate of the Moscow Stroganoff Institute. He lives in New York City." },
     ]},
     { label:'DESIGN PHILOSOPHY', cX:151, cY:128, copy:"There are key principles that shape our design philosophy. Keep things simple. Hide elements, but leave them accessible. Subtract, allowing the most important elements to rise to the surface. These mantras equally apply to traditional and interactive design. We study and follow the best examples of contemporary graphic design and typography. We read books on geometry, physics and trigonometry, and we appl y ou r knowledg e to interactive design. This results in simple yet sophisticated user experiences that we, and our clients, are very proud of. We believe that what is happenning to interactive design now is similar to the graphic design revolutio n o f th e past . W e maintai n goo d relations with many leading graphic designers and feel that exchanging ideas leads to the further development of our trade." },
     { label:'BUSINESS PHILOSOPHY', cX:151, cY:128, copy:"We are eager to work on the best projects with the best clients. In a perfect world, our clients have a specific project with a specific budget in mind. They care very much about design, branding and image. Together we outline the scope of the project and the deliverables. We focus on utilizing all the design nuances of our clients' brands and extend them into a digital medium. You can always expect us to deliver a superior product in terms of the overall creative execution, the project experience, and the technology used to develop it. We make it our business to have the most talented people working at Firstborn; from designers to programmers to project managers. Everyone pulls their weight. We are dedicated to creating incredible work in an extremely efficient way. Take a look at our portfolio and judge for yourself. Get to know us. We think you will like what you see." },
     { label:'HISTORY', cX:151, cY:180,
       chips:[
         {label:'1997', copy:"The atmosphere in the city at this time was frenetic. There were IPOs, ridiculous salaries, all-nighters, multi-million dollar deals. There were focus groups. There were focus groups about how to conduct focus groups. There were meetings, and \"pre-meetings.\" Words like \"usability\" and \"synergy\" were being over-heard in taxi cabs and in martini bars. It was just a terrible time to be a human being. We wrote our business plan, looked for space, created our logo and set up shop. We launched our website and started looking for clients."},
         {label:'1998', copy:"We ignored the hype as much as possible and focused on finding and doing good work. One of our earliest projects was for Calvin Klein, a CD-ROM featuring his Fall runway show. The project was a big success. It was the kind of work we knew we could do. With the Calvin Klein piece now part of our portfolio, we landed work at Redken and L'Oreal. We also began a long-standing relationship with the New York Racing Association when we designed the official Belmont Stakes website. When the year ended, we found time and money to make our second website. And hire a few really talented people."},
         {label:'1999', copy:"We consistently worked hard and steered clear of hyperbole. No advertising, no PR. We charged fair prices for superior work. Over and over again. We were organized, accountable and flexible during projects. We picked up some new clients including Business Week, Federated, Antonio Fusco, and Comedy Central. We did work with Chanel, Columbia University, Dell and fragrance-giant Dragoco. And of course, we found time to re-do our own website."},
         {label:'2000', copy:"Early in 2000, we launched a site for fashion designer Yigal-Azrouel. It became very well known for its inventive use of navigation and motion. It was critically acclaimed, featured prominently on Macromedia's website and won several awards. Later that year, we worked with Ralph Lauren, Lancome, and had just started a project with Lam Research. Then one day we got a call from Madonna's manager, asking if we would be interested in working on a website for her upcoming album. We were extremely interested."},
         {label:'2001', copy:"We continued to do what we do best. Focus on the work. Never use words like \"synergy\" and \"usability.\" Just stay focused on \"quality.\" That's a word we understand. In 2001 we were proud to have continued relationships with companies we worked with in the past; Redken, Estee Lauder, Ralph Lauren and also to begin new ones with companies like Sergio Rossi, Madstone Films and John Frieda. We're looking forward to 2002, unbelievably our fifth year in business."},
         {label:'2002', copy:"2002 started off with a bang and found us feverously working on projects for our stable of clients, including Lam Research, NYRA, L'Oreal and Calvin Klein. Then, when summer hit, things really picked up! Before we could blink we found ourselves with a bevy of new projects from great new clients. We designed a Video on Demand interface for Diet Coke, a sexy promotional website for Bacardi, a touch-screen kiosk for cosmetic giant Shiseido, and a playful website for the VH1/Vogue Fashion Awards 2002, just to name a few."},
     ]},
 ]},
 { label:'WHAT WE DO', cX:460, cY:149,
   copy:"Firstborn creates digital design projects that corporate clients use in many areas of their businesses. Our work helps heavily branded companies more effectively sell, market, train and communicate, via the computer. Generally, this means we make websites, intranet sites,\n\nWe don't do extended consulting, market research, usability testing, or focus groups. That may be worth repeating. We don't do focus groups. We limit usability testing to our staff and our client's staff. We envision, manage,",
   children:[
     { label:'THE BASICS', cX:202, cY:245, copy:"Working with images, copy, video and audio, we are able to create signature pieces that make our clients proud. Creating a great interactive design can seem very complex, but to us it's not. We work as a team and each of us understand the process and our roles; what it is we are supposed to do and when are we supposed to do it. Our managers manage and our designers design. Our programmers program and we all deliver.",
       children:[
         { label:'ENVISION', cX:348, cY:191, copy:"is a highly creative thing, and other times it is as straightforward as a simple website outline. Things start with an idea for applying new media to improve a basic business function and steamroll from there. A Firstborn producer will work with your business to flush out the foundation of the project idea. Once the idea is documented, our producers review them with our Creative Director and together they further articulate how we envision the project. The details of the idea are documented in a proposal, which contains an outline of content to be included in the project, a budget and a schedule. It's basically a road map of what's to come." },
         { label:'MANAGE',   cX:348, cY:191, copy:"resourceful and flexible professionals who know how to get the job done. Our producers are the conduit for all information between our clients and our creative team. They work with clients to kick off the project, identify, collect and label project assets, review creative work, document feedback, anticipate challenges and ultimately deliver a piece that makes everyone proud." },
         { label:'DESIGN',   cX:348, cY:191, copy:"that users find intelligent, enticing and charming. Our studio contains the latest equipment and software. But perhaps more important, it contains the oldest and truest of all artistic equipment and software; pencils, paper and a handful of creative minds and artistic souls." },
         { label:'PROGRAM',  cX:348, cY:191, copy:"Flash websites or Director presentations as we are implementing complex databases and setting up web servers. We know SQL, C++, JSP, ASP, Lotus Notes, Unix, Cold Fusion, you name it. Our code is always delivered to our clients in a clean and logical manner so that others can work with it if necessary in the future." },
         { label:'DELIVER',  cX:348, cY:191, copy:"has a proven track record of delivering exceptional work for thrilled clients. We take a brand's imagery, understand its philosophy and go a long way with both. We get intrinsically involved with our clients and we're proud of the fact that we do repeat work with lots of them. The truest test in any business is whether your clients come back for more. Ours do." },
     ]},
     { label:'TYPES OF PROJECTS', cX:189, cY:230, copy:"There are many ways of using \"new media\" to improve basic needs in everyday business. All businesses strive to communicate more clearly, more efficiently and more cost-effectively with their employees, clients and potential clients. We create works that are used by companies, via the computer, to sell, market, train and communicate. The computer, and in particular interactive design, is the biggest thing to hit communications since",
       children:[
         { label:'SALES', cX:304, cY:180, copy:"There are lots of ways to use interactive design to support sales efforts. An effective laptop presentation can greatly enhance most sales presentations, delivering a consistent, entertaining and impressive message to your audience. An effective website can market and sell a clients' goods and services immediately via the Internet. Kiosk presentations can take tradeshow booths to another level. A password protected extranet site could be a great service to your existing clients, allowing them to re- order without faxing forms. Firstborn will spend time learning about how your company currently sells and offer suggestions for adding new media to your arsenal." },
         { label:'MARKETING/PR', cX:304, cY:180, copy:"These days, people are looking at their computer screens as often as they look at television, magazines, outdoor billboards, and other traditional media. The computer is an increasingly powerful outlet for delivering your messages. There are the obvious ways via the web, email campaigns, etc. And there are some less obvious ways. Firstborn will meet with your marketing team to explore potential for applying new media to your company's marketing efforts." },
         { label:'COMMUNICATIONS', cX:304, cY:240, copy:"All companies communicate with their employees and clients on a regular basis. To the clients we work with, the way they communicate is almost as important as what they are communicating. Interactive media is a great way to deliver company memos, annual reports, employee orientation materials, press, news and other important information. Firstborn will learn how your company currently communicates and offer suggestions for applying new media to your practices." },
         { label:'TRAINING', cX:304, cY:180, copy:"It's been proven that using interactive media in a training or education environment will exponentially increase chances for the participants' retention of material. More and more companies are turning to computer- based, interactive presentations to teach their employees how to more effectively do their jobs. Firstborn will work with your company to explore ideas for transforming antiquated ways into contemporary, engaging presentations that will engage and excite your audience." },
     ]},
     { label:'TYPES OF DELIVERY', cX:400, cY:209, copy:"When you look at interactive designs, what you see on the monitor can be delivered to the computer in many different ways. You may be looking at a presentation on a laptop while traveling, or at a kiosk in a mall, or at your desk at work, or in the comfort of your own home. Most of Firstborn's work is delivered in the form of websites or",
       children:[
         { label:'WEB SITES', cX:295, cY:164, copy:"We create many presentations in the form of websites. Websites can be very effective because people can see your stuff day and night from anywhere on the planet. Websites are great because they can constantly change and evolve, from day-to-day or season-to-season. Firstborn has created memorable websites for a wide range of clients. Our websites are impressive multimedia experiences." },
         { label:'CD-ROMS',   cX:295, cY:164, copy:"CD-ROMs are a great way of delivering digital design presentations. Many people have been saying for years that the \"CD-ROM is dead.\" Wrong. CD-ROMs are terrific when you do not have access to the Internet or when your presentations include a lot of video and motion graphics. And they are very inexpensive to duplicate, package and/or mail." },
         { label:'INTRANETS', cX:295, cY:164, copy:"Intranet sites seem very much like websites, but they are limited to a particular audience. They are websites that only certain people can gain access to, usually with a password. Intranet sites are great for companies who are looking to share information and presentations with their colleagues and clients, but that they don't want to share with the rest of the world." },
     ]},
 ]},
 { label:'HOW WE DO IT', cX:509, cY:149,
   copy:"There are no secrets to creating incredible interactive design. It does not take endless brainstorming meetings, ping-pong tables in the lunchroom, or a \"proprietary methodology\". It takes talented, determined people who know what they are doing. We are a company of highly",
   children:[
     { label:'THE BASICS', cX:202, cY:245, copy:"W e wor k a s a tea m at Firstborn. W e ar e producers, designers, productio n artists\n\ninteractive presentations. We understand our roles and we",
       children:[
         { label:'ENVISION', cX:245, cY:202, copy:"We study companies and the way they currently communicate with their clients or employees. We hope to find that current methods can be vastly improved by the use of interactive design. We look at methods of cost, presentation, their impact and overall effectiveness. Our producers further develop ideas by planning a hypothetical project. They think through the overall objectives, the content to be presented, the history of the brand, the design considerations, the audience point-of-view, the delivery method, etc. The entire concept is flushed out in a formal proposal." },
         { label:'MANAGE',   cX:245, cY:202, copy:"Managing creativity is an oxymoron. So we concentrate on managing the tangible things inherent to creative projects, like collecting assets and watching the schedule and budget. We trust our designers and \"manage\" them as little as possible during the creative process. When the time comes to present their designs to our clients, our producers are adept at documenting and communicating input and feedback. From the initial concepts to the delivered piece, our producers are involved in every last detail. It isn't always easy, but they manage." },
         { label:'DESIGN',   cX:245, cY:202, copy:"Like any art form, interactive design requires imagination, taste and inspiration. We work with client-supplied materials and existing elements of a brand's identity. Inspiration can strike at any time. Our designers carry sketchbooks everywhere. From initial sketches we create comps in Photoshop. We may do a bit of prototyping in Flash, as well. The germ of what later becomes a finished design takes only a week or two to develop." },
         { label:'PROGRAM',  cX:245, cY:202, copy:"Before presenting layouts and design concepts to our clients, we share them with our programmers. That's because it's important to have them thinking about how things can be done early on in the project. They can also offer insights and ideas to our designers on the latest technology, which may spark a new creative solution. Later, when the client is comfortable with design direction, our programmers can do their thing. They've already been thinking about it." },
         { label:'DELIVER',  cX:245, cY:202, copy:"When we're nearing completion, we deliver a \"test\" or \"beta\" version of the piece to our client. We also deliver a paper copy of each and every screen in the project for proofreading purposes. After a round or two of proofreading, we deliver a final piece, along with all digital assets and code created for the project. These files are organized, labeled and delivered in a logical, clear manner so that everything can be easily altered or updated in the future." },
     ]},
     { label:'CASE STUDIES', cX:331, cY:217, copy:"There are interesting\n\nall of our projects. We enjoy creating and designing interactive projects for our clients. We've met wonderful characters along the way, and we've learned a ton. We hope you enjoy a few of the stories behind some of our projects and at the same time get a feel for how a potential project",
       children:[
         { label:'REDKEN', cX:169, cY:177, copy:"Each month, we work with Redken to produce a multimedia laptop presentation delivered via CD-ROM to their nationwide sales force. This project started as a concept in 1998, when we first worked with the folks who lead Redken's sales department. At the time, we were creating a multimedia slideshow for their National Sales Meeting. They were impressed with our work and they wondered if we might be able to do something to spice up their monthly sales meetings.\n\nWe scheduled a sit-down to learn more about what they were doing at their meetings. They were relying primarily on small posters and their charisma as they stood in front of an average audience of forty people per week. When the meetings ended, they would leave behind the posters at the front of the room. These posters were costly, and they were producing large quantities of them each month.\n\nWe asked if we could borrow copies of the \"sales kits\" from the previous several months. We studied them to generate some ideas. In looking through the materials, we came to understand that they advertised promotions in specific product categories each month. We could see that they had beautiful images of models and products. We knew we could create a fantastic presentation.\n\nWe suggested a prototype, or a dummy, of the project. Redken gave us a budget that would later be applied to the actual project. In designing the prototype, we created a modern, multimedia version of the sales presentation. We proved that we could produce a great piece each month for less money than Redken was currently spending on creating the print materials.\n\nToday, the laptop presentations are a staple of Redken's overall sales process. Monthly meetings are made exciting and entertaining with the help of the interactive designs we develop together." },
         { label:'MADONNA', cX:169, cY:177, copy:"We were sitting around the office one evening ready to call it a day when the phone rang. Someone at the other end asked us, \"How'd you like to do a website for Madonna?\" At first we were a bit skeptical. We checked things out the next day, and it turned out to be no hoax. Madonna's manager had picked us as one of the firms to pitch a website to support her upcoming album, Music.\n\nWe did all that we could to try and win the project. We wrote letters, asked friends in the entertainment industry to put in a good word, and eventually were given a chance to present our portfolio to her manager. She liked what she saw and we armed her with CD-ROMs and websites to show Madonna. We were awarded the project.\n\nWe had to move quickly. It was mid-July and the first phase of the project had to be launched by August 4th, the same day the first single was released to radio. MTV and VH1 were promoting the album, the single and (gulp) the new website around the clock. Pressure was mounting.\n\nWe conceived the idea of creating a music mixer in Flash, and we went about designing and programming at a furious pace. We would check in with Madonna's camp on a near daily basis by sending overnight packages and secret web addresses. They would report back positive feedback from Madonna herself. It was an exciting time for everyone involved with the project.\n\nWhen the mixer site was posted, it had an overwhelmingly positive response from fans around the world. As might be expected of Madonna fans, thousands of emails were sent offering praise, admiration and congratulations. We had little time to celebrate and began work immediately on the \"official\" album site. Just upon completion, we were given an opportunity to present the final piece to Madonna in person, which was a great honor." },
         { label:'FEDERATED', cX:169, cY:177, copy:"This project was created way back in 1998. Federated was preparing to launch a new bath and body line called Souson, which they would sell exclusively in Federated department stores. A dedicated group of people in their cosmetics division had conceived the line and written a business plan, with branding and package design ideas. They were preparing to make internal presentations to company executives.\n\nThey became aware of Firstborn by word of mouth. The Federated Senior VP of Cosmetics was friendly with the CEO of one of our clients. When discussing the launch of her new project, the subject of presentations came up. It was recommended to her that she see some of the things we were doing.\n\nWe met with her and discussed her goals. She needed to cover basic information about the line, including business objectives and strategies. But she also needed to convey an important part of the concept, which revolved around 11 products made up of a combination of colors and fragrances. It needed to be strong visually.\n\nHer first meeting was met with rave reviews. She went on to give successful presentations and people were asking her for copies of the interactive piece. They found it to be helpful in sharing information about the Souson launch with colleagues. CD-ROMs were duplicated and it was ultimately shared with the press, merchandising managers, retailers and beauty advisors." },
         { label:'CALVIN KLEIN', cX:169, cY:177, copy:"Calvin Klein is a company that is concerned with consistent presentation of its brand. They rely heavily on retail partners to adhere to the merchandising designs that are put in place each season. Twice a year, department store employees receive merchandising manuals, or as Calvin calls them, Visual Merchandising Directives. They are filled with step-by-step instructions and photographic examples that are used during the stages of setting up a new retail environment.\n\nIn an effort to train these people more effectively, Calvin asked us to create a multimedia version of the same information. We studied the existing materials and designed interactive ways of illustrating the standards. We incorporated the seasonal ad looks and overall brand creative direction in the design.\n\nMerchandisers can request a CD-ROM of seasonal standards for window displays, mannequin placements, folding techniques and other pertinent, timely information. And more recently, department stores and other retailers have access to the Visual Merchandising Directives via a password protected extranet site." },
     ]},
 ]},

 Madonna, Gucci and lots",2.0,72.8,11.0],["of other well-known names. He also wrote a chapter and",2.0,84.8,11.0],["tutorial for the best-selling book \"New Masters of Flash: 2002",2.0,96.8,11.0],["Annual\". Vas is a graduate of the Moscow Stroganoff Institute.",2.0,108.9,11.0],["He lives in New York City.",2.0,121.0,11.0]],"designPhilosophyText":[["There are key principles that shape our design",2.0,12.5,11.0],["philosophy. Keep things simple. Hide elements,",2.0,24.6,11.0],["but leave them accessible. Subtract, allowing the",2.0,36.6,11.0],["most important elements to rise to the surface.",2.0,48.6,11.0],["These mantras equally apply to traditional and",2.0,60.7,11.0],["interactive design.",2.0,72.8,11.0],["We study and follow the best examples of",2.0,96.8,11.0],["contemporary graphic design and typography.",2.0,108.9,11.0],["We read books on geometry, physics and",2.0,121.0,11.0],["trigonometry, and we appl",2.0,133.0,11.0],["y",2.0,133.0,11.0],[" ou",2.0,133.0,11.0],["r",2.0,133.0,11.0],[" knowledg",2.0,133.0,11.0],["e",2.0,133.0,11.0],[" to",2.0,133.0,11.0],["interactive design. This results in simple yet",2.0,145.1,11.0],["sophisticated user experiences that we, and",2.0,157.1,11.0],["our clients, are very proud of.",2.0,169.2,11.0],["We believe that what is happenning to interactive",2.0,193.2,11.0],["design now is similar to the graphic design",2.0,205.3,11.0],["revolutio",2.0,217.3,11.0],["n",2.0,217.3,11.0],[" o",2.0,217.3,11.0],["f",2.0,217.3,11.0],[" th",2.0,217.3,11.0],["e",2.0,217.3,11.0],[" past",2.0,217.3,11.0],[".",2.0,217.3,11.0],[" W",2.0,217.3,11.0],["e",2.0,217.3,11.0],[" maintai",2.0,217.3,11.0],["n",2.0,217.3,11.0],[" goo",2.0,217.3,11.0],["d",2.0,217.3,11.0],[" relations",2.0,217.3,11.0],["with many leading graphic designers and feel that",2.0,229.4,11.0],["exchanging ideas leads to the further development",2.0,241.4,11.0],["of our trade.",2.0,253.5,11.0]],"businessPhilosophyText":[["We are eager to work on the best projects with",2.0,12.5,1 e,",-222.3,157.1,11.0],["DESIGN, program and deliver.",-152.8,169.2,11.0]],"theBasicsText":[["Working with images, copy,",-137.5,-35.5,11.0],["video and audio, we are able",-143.9,-22.9,11.0],["to create signature pieces",-131.7,-10.4,11.0],["that make our clients proud.",-142.7,2.1,11.0],["Creating a great interactive design can seem very",-131.7,14.7,11.0],["complex, but to us it's not. We work as a team and",-135.4,27.2,11.0],["each of us understand the process and our roles; what",-157.0,39.8,11.0],["it is we are supposed to do and when are we supposed",-148.2,52.3,11.0],[" to do it. Our managers manage and our designers",-134.8,64.8,11.0],["design. Our programmers program and we all deliver.",-149.4,77.4,11.0]],"envisionText":[["Everything begins with",-1.1,-27.5,11.0],["how we and our clients",-1.1,-14.9,11.0],["collectively envision the",-1.1,-2.4,11.0],["project. Sometimes this",-1.1,10.2,11.0],["is a highly creative thing, and other times it is as",-132.0,24.1,11.0],["straightforward as a simple website outline. Things",-132.0,36.7,11.0],["start with an idea for applying new media to improve",-132.0,49.2,11.0],["a basic business function and steamroll from there.",-132.0,61.8,11.0],["A Firstborn producer will work with your business to",-132.0,74.3,11.0],["flush out the foundation of the project idea. Once the",-132.0,86.9,11.0],["idea is documented, our producers review them with",-132.0,99.5,11.0],["our Creative Director and together they further",-132.0,112.0,11.0],["articulate how we envision the project. The details",-132.0,124.5,11.0],["of the idea are documented in a proposal, which",-132.0,137.1,11.0],["contains an outline of content to be included in the",-132.0,149.7,11.0],["project, a budget and a schedule. It's basically a road",-132.0,162.2,11.0],["map of what's to come.",-132.0,174.8,11.0]],"manageText":[["Our projects are managed with",-1.1,-27.5,11.0],["common sense, not project",-1.1,-14.9,11.0],["management software. We are",-1.1,-2.4,11.0],["experienced, detail-oriented,",-1.1,10.2,11.0],["resourceful and flexible professionals who know how to",-132.0,23.1,11.0],["get the job done. Our producers are the conduit for all",-132.0,35.7,11.0],["information between our clients and our creative team.",-132.0,48.2,11.0],["They work with clients to kick off the project, identify,",-132.0,60.8,11.0],["collect and label project assets, review creative work,",-132.0,73.3,11.0],["document feedback, anticipate challenges and ultimately",-132.0,85.9,11.0],["deliver a piece that makes everyone proud.",-132.0,98.5,11.0]],"designText":[["At the heart of all things,",-1.1,-27.5,11.0],["we are designers. Our",-1.1,-14.9,11.0],["team creates interfaces",-1.1,-2.4,11.0],["and navigation devices",-1.1,10.2,11.0],["that users find intelligent, enticing and charming.",-132.0,23.1,11.0],["Our studio contains the latest equipment and",-132.0,35.7,11.0],["software. But perhaps more important, it contains",-132.0,48.2,11.0],["the oldest and truest of all artistic equipment and",-132.0,60.8,11.0],["software; pencils, paper and a handful of creative",-132.0,73.3,11.0],["minds and artistic souls.",-132.0,85.9,11.0]],"programText":[["Working hand in hand",-1.1,-27.5,11.0],["with our design team are",-1.1,-14.9,11.0],["our programmers. We are",-1.1,-2.4,11.0],["as comfortable developing",-1.1,10.2,11.0],["Flash websites or Director presentations as we are",-132.0,23.1,11.0],["implementing complex databases and setting up web",-132.0,35.7,11.0],["servers. We know SQL, C++, JSP, ASP, Lotus Notes,",-132.0,48.2,11.0],["Unix, Cold Fusion, you name it. Our code is always",-132.0,60.8,11.0],["delivered to our clients in a clean and logical manner so",-132.0,73.3,11.0],["that others can work with it if necessary in the future.",-132.0,85.9,11.0]],"deliverText":[["We deliver. You get more",-2.1,-27.5,11.0],["than you pay for when you",-2.1,-14.9,11.0],["work with us. We really",-2.1,-2.4,11.0],["aim to please. Firstborn",-2.1,10.2,11.0],["has a proven track record of delivering exceptional",-133.0,23.1,11.0],["work for thrilled clients. We take a brand's imagery,",-133.0,35.7,11.0],["understand its philosophy and go a long way with both.",-133.0,48.2,11.0],["We get intrinsically involved with our clients and we're",-133.0,60.8,11.0],["proud of the fact that we do repeat work with lots of",-133.0,73.3,11.0],["them. The truest test in any business is whether your",-133.0,85.9,11.0],["clients come back for more. Ours do.",-133.0,98.5,11.0]],"typesOfProjectsText":[["There are many ways of using",-152.8,-27.5,11.0],["\"new media\" to improve basic",-153.7,-14.9,11.0],["needs in everyday  business.",-147.2,-2.4,11.0],["All businesses strive to communicate more clearly, more",-155.1,10.6,11.0],["efficiently and  more cost-effectively with their employees,",-164.8,23.1,11.0],["clients and potential clients. We create works that are used",-169.7,35.7,11.0],["by companies, via the computer, to sell, market, train and",-159.7,48.2,11.0],["communicate. The computer, and in particular interactive",-160.6,60.8,11.0],["design, is the biggest thing to hit communications since",-152.0,73.3,11.0],["television. Its impact is immeasurable.",-63.4,85.9,11.0]],"salesText":[["There are lots of ways to use interactive design",2.0,12.5,11.0],["to support sales efforts. An effective laptop",2.0,25.1,11.0],["presentation can greatly enhance most sales",2.0,37.6,11.0],["presentations, delivering a consistent,",2.0,50.1,11.0],["entertaining and impressive message to your",2.0,62.7,11.0],["audience. An effective website can market and",2.0,75.2,11.0],["sell a clients' goods and services immediately",2.0,87.8,11.0],["via the Internet. Kiosk presentations can take",2.0,100.3,11.0],["tradeshow booths to another level. A password",2.0,112.9,11.0],["protected extranet site could be a great service",2.0,125.5,11.0],["to your existing clients, allowing them to re-",2.0,138.0,11.0],["order without faxing forms. Firstborn will spend",2.0,150.6,11.0],["time learning about how your company",2.0,163.1,11.0],["currently sells and offer suggestions for adding",2.0,175.7,11.0],["new media to your arsenal.",2.0,188.2,11.0]],"marketingPrText":[["These days, people are looking at their",2.0,12.5,11.0],["computer screens as often as they look at",2.0,25.1,11.0],["television, magazines, outdoor billboards, and",2.0,37.6,11.0],["other traditional media. The computer is an",2.0,50.1,11.0],["increasingly powerful outlet for delivering your",2.0,62.7,11.0],["messages. There are the obvious ways via the",2.0,75.2,11.0],["web, email campaigns, etc. And there are",2.0,87.8,11.0],["some less obvious ways. Firstborn will meet",2.0,100.3,11.0],["with your marketing team to explore potential",2.0,112.9,11.0],["for applying new media to your company's",2.0,125.5,11.0],["marketing efforts.",2.0,138.0,11.0]],"communicationsText":[["All companies communicate with their",2.0,12.5,11.0],["employees and clients on a regular basis.",2.0,25.1,11.0],["To the clients we work with, the way they",2.0,37.6,11.0],["communicate is almost as important as",2.0,50.1,11.0],["what they are communicating. Interactive",2.0,62.7,11.0],["media is a great way to deliver company",2.0,75.2,11.0],["memos, annual reports, employee orientation",2.0,87.8,11.0],["materials, press, news and other important",2.0,100.3,11.0],["information. Firstborn will learn how your",2.0,112.9,11.0],["company",2.0,125.5,11.0],["currently communicates and offer",2.0,125.5,11.0],["suggestions",2.0,138.0,11.0],[" for applying new media to your",2.0,138.0,11.0],["practices.",2.0,150.6,11.0]],"trainingText":[["It's been proven that using interactive media",2.0,12.5,11.0],["in a training or education environment will",2.0,25.1,11.0],["exponentially increase chances for the",2.0,37.6,11.0],["participants' retention of material. More and",2.0,50.1,11.0],["more companies are turning to computer-",2.0,62.7,11.0],["based, interactive presentations to teach their",2.0,75.2,11.0],["employees how to more effectively do their",2.0,87.8,11.0],["jobs. Firstborn will work with your company to",2.0,100.3,11.0],["explore ideas for transforming antiquated ways",2.0,112.9,11.0],["into contemporary, engaging presentations that",2.0,125.5,11.0],["will engage and excite your audience.",2.0,138.0,11.0]],"typesOfDeliveryText":[["When you look at interactive designs, what you see on",-275.0,12.5,11.0],["the monitor can be delivered to the computer in many",-272.9,25.1,11.0],["different ways. You may be looking at a presentation on a",-288.9,37.6,11.0],["laptop while traveling, or at a kiosk in a mall, or at your",-276.1,50.1,11.0],["desk at work, or in the comfort of your own home. Most of",-293.9,62.7,11.0],["Firstborn's work is delivered in the form of websites or",-276.1,75.2,11.0],["intranet sites via the Internet, or on CD-ROM.",-229.7,87.8,11.0]],"websitesText":[["We create many presentations in the form of",2.0,12.5,11.0],["websites. Websites can be very effective",2.0,25.1,11.0],["because people can see your stuff day and",2.0,37.6,11.0],["night from anywhere on the planet. Websites are",2.0,50.1,11.0],["great because they can constantly change and",2.0,62.7,11.0],["evolve, from day-to-day or season-to-season.",2.0,75.2,11.0],["Firstborn has created memorable websites for",2.0,87.8,11.0],["a wide range of clients. Our websites are",2.0,100.3,11.0],["impressive multimedia experiences.",2.0,112.9,11.0]],"cdRomsText":[["CD-ROMs are a great way of delivering digital",2.0,12.5,11.0],["design presentations. Many people have been",2.0,25.1,11.0],["saying for years that the \"CD-ROM is dead.\"",2.0,37.6,11.0],["Wrong. CD-ROMs are terrific when you do not",2.0,50.1,11.0],["have access to the Internet or when your",2.0,62.7,11.0],["presentations include a lot of video and motion",2.0,75.2,11.0],["graphics. And they are very inexpensive to",2.0,87.8,11.0],["duplicate, package and/or mail.",2.0,100.3,11.0]],"intranetsText":[["Intranet sites seem very much like websites,",2.0,12.5,11.0],["but they are limited to a particular audience.",2.0,25.1,11.0],["They are websites that only certain people",2.0,37.6,11.0],["can gain access to, usually with a password.",2.0,50.1,11.0],["Intranet sites are great for companies who are",2.0,62.7,11.0],["looking to share information and presentations",2.0,75.2,11.0],["with their colleagues and clients, but that they",2.0,87.8,11.0],["don't want to share with the rest of the world.",2.0,100.3,11.0]],"howWeDoItText":[["There are no secrets to creating incredible interactive",-275.3,12.5,11.0],["design. It does not take endless brainstorming meetings,",-290.8,24.6,11.0],["ping-pong tables in the lunchroom, or a \"proprietary",-266.4,36.6,11.0],["methodology\". It takes talented, determined people who",-288.1,48.6,11.0],["know what they are doing. We are a company of highly",-278.8,60.7,11.0],["creative people who work in an organized, disciplined way",-297.4,72.8,11.0],["always focusing on the job at hand.",-181.9,84.8,11.0]],"theBasicsText2":[["W",-119.8,-18.5,11.0],["e",-119.8,-18.5,11.0],[" wor",-119.8,-18.5,11.0],["k",-119.8,-18.5,11.0],[" a",-119.8,-18.5,11.0],["s",-119.8,-18.5,11.0],["a",-119.8,-18.5,11.0],[" tea",-119.8,-18.5,11.0],["m",-119.8,-18.5,11.0],[" at",-119.8,-18.5,11.0],["Firstborn.",-137.2,-6.0,11.0],["W",-137.2,-6.0,11.0],["e",-137.2,-6.0,11.0],[" ar",-137.2,-6.0,11.0],["e",-137.2,-6.0,11.0],[" producers,",-137.2,-6.0,11.0],["designers,",-138.2,6.6,11.0],["productio",-138.2,6.6,11.0],["n",-138.2,6.6,11.0],[" artists",-138.2,6.6,11.0],[" and programmers, working together in specific roles to create",-140.7,18.6,11.0],["interactive presentations. We understand our roles and we",-138.4,31.2,11.0],["respect each other. We break down our process into five areas:",-143.2,43.8,11.0],["Envision, Manage, Design, Program, Deliver.",-53.8,56.3,11.0]],"envisionText2":[["We study companies and the way they currently",2.0,12.5,11.0],["communicate with their clients or employees.",2.0,25.1,11.0],["We hope to find that current methods can be vastly",2.0,37.6,11.0],["improved by the use of interactive design. We look",2.0,50.1,11.0],["at methods of cost, presentation, their impact and",2.0,62.7,11.0],["overall effectiveness. Our producers further develop",2.0,75.2,11.0],["ideas by planning a hypothetical project. They think",2.0,87.8,11.0],["through the overall objectives, the content to be",2.0,100.3,11.0],["presented, the history of the brand, the design",2.0,112.9,11.0],["considerations, the audience point-of-view, the",2.0,125.5,11.0],["delivery method, etc. The entire concept is flushed",2.0,138.0,11.0],["out in a formal proposal.",2.0,150.6,11.0]],"manageText2":[["Managing creativity is an oxymoron. So we concentrate",2.0,12.5,11.0],["on managing the tangible things inherent to creative",2.0,25.1,11.0],["projects, like collecting assets and watching the schedule",2.0,37.6,11.0],["and budget. We trust our designers and \"manage\" them",2.0,50.1,11.0],["as little as possible during the creative process. When the",2.0,62.7,11.0],["time comes to present their  designs to our clients, our",2.0,75.2,11.0],["producers are adept at documenting and communicating",2.0,87.8,11.0],["input and feedback. From the initial concepts to the",2.0,100.3,11.0],["delivered piece, our producers are involved in every last",2.0,112.9,11.0],["detail. It isn't always easy, but they manage.",2.0,125.5,11.0]],"designText2":[["Like any art form, interactive design requires",2.0,12.5,11.0],["imagination, taste and inspiration. We work with",2.0,25.1,11.0],["client-supplied materials and existing elements of a",2.0,37.6,11.0],["brand's identity. Inspiration can strike at any time.",2.0,50.1,11.0],["Our designers carry sketchbooks everywhere. From",2.0,62.7,11.0],["initial sketches we create comps in Photoshop.",2.0,75.2,11.0],["We may do a bit of prototyping in Flash, as well.",2.0,87.8,11.0],["The germ of what later becomes a finished design",2.0,100.3,11.0],["takes only a week or two to develop.",2.0,112.9,11.0]],"programText2":[["Before presenting layouts and design concepts to our",2.0,12.5,11.0],["clients, we share them with our programmers.  That's",2.0,25.1,11.0],["because it's important to have them thinking about",2.0,37.6,11.0],["how things can be done early on in the project. They",2.0,50.1,11.0],["can also offer insights and ideas to our designers on",2.0,62.7,11.0],["the latest technology, which may spark a new creative",2.0,75.2,11.0],["solution. Later, when the client is comfortable with",2.0,87.8,11.0],["design direction, our programmers can do their thing.",2.0,100.3,11.0],["They've already been thinking about it.",2.0,112.9,11.0]],"deliverText2":[["When we're nearing completion, we deliver a \"test\"",2.0,12.5,11.0],["or \"beta\" version of the piece to our client. We also",2.0,25.1,11.0],["deliver a paper copy of each and every screen in the",2.0,37.6,11.0],["project for proofreading purposes. After a round or",2.0,50.1,11.0],["two of proofreading, we deliver a final piece, along",2.0,62.7,11.0],["with all digital assets and code created for the",2.0,75.2,11.0],["project. These files are organized, labeled and",2.0,87.8,11.0],["delivered in a logical, clear manner so that everything",2.0,100.3,11.0],["can be easily altered or updated in the future.",2.0,112.9,11.0]],"caseStudiesText":[["There are interesting",-105.8,-27.5,11.0],["stories and people behind",-126.1,-14.9,11.0],[" all of our projects. We",-112.8,-2.4,11.0],["enjoy  creating and designing interactive projects for our clients.",-113.4,10.6,11.0],["We've met wonderful characters along the way, and we've learned",-123.7,23.1,11.0],["a ton. We hope you enjoy a few of the stories behind some of our",-116.2,35.7,11.0],["projects and at the same time get a feel for how a potential project",-124.8,48.2,11.0],["of your own may shape up.",67.2,60.8,11.0]],"redkenText":[["Each month, we work with Redken to produce a multimedia laptop",2.0,12.5,11.0],["presentation delivered via CD-ROM to their nationwide sales force.",2.0,24.6,11.0],["This project started as a concept in 1998, when we first worked with",2.0,36.6,11.0],["the folks who lead Redken's sales department. At the time, we were",2.0,48.6,11.0],["TO LAUNCH",-241.7,50.0,10.0],["CLICK",-194.9,50.0,10.0],["creating a multimedia slideshow for their National Sales Meeting.",2.0,60.7,11.0],["They were impressed with our work and they wondered if we might",2.0,72.8,11.0],["be able to do something to spice up their monthly sales meetings.",2.0,84.8,11.0],["We scheduled a sit-down to learn more about what they were doing",2.0,107.5,11.0],["at their meetings. They were relying primarily on small posters and",2.0,119.5,11.0],["their charisma as they stood in front of an average audience of forty",2.0,131.6,11.0],["people per week. When the meetings ended, they would leave",2.0,143.7,11.0],["behind the posters at the front of the room. These posters were",2.0,155.7,11.0],["costly, and they were producing large quantities of them each month.",2.0,167.8,11.0],["We asked if we could borrow copies of the \"sales kits\" from the",2.0,187.5,11.0],["previous several months. We studied them to generate some ideas.",2.0,199.6,11.0],["In looking through the materials, we came to understand that they",2.0,211.6,11.0],["advertised promotions in specific product categories each month.",2.0,223.7,11.0],["We could see that they had beautiful images of models and",2.0,235.7,11.0],["products. We knew we could create a fantastic presentation.",2.0,247.8,11.0],["We suggested a prototype, or a dummy, of the project. Redken gave",2.0,269.5,11.0],["us a budget that would later be applied to the actual project. In",2.0,281.6,11.0],["designing the prototype, we created a modern, multimedia version",2.0,293.6,11.0],["of the sales presentation. We proved that we could produce a great",2.0,305.6,11.0],["piece each month for less money than Redken was currently",2.0,317.7,11.0],["spending on creating the print materials.",2.0,329.8,11.0],["Today, the laptop presentations are a staple of Redken's overall sales",2.0,351.4,11.0],["process. Monthly meetings are made exciting and entertaining with",2.0,363.4,11.0],["the help of the interactive designs we develop together.",2.0,375.5,11.0]],"madonnaText":[["We were sitting around the office one evening ready to call it a",2.0,12.5,11.0],["day when the phone rang. Someone at the other end asked us,",2.0,24.6,11.0],["\"How'd you like to do a website for Madonna?\" At first we were a bit",2.0,36.6,11.0],["skeptical.  We checked things out the next day, and it turned out to",2.0,48.6,11.0],["TO LAUNCH",-241.7,50.0,10.0],["CLICK",-194.9,50.0,10.0],["be no hoax. Madonna's manager had picked us as one of the firms",2.0,60.7,11.0],["to pitch a website to support her upcoming album, Music.",2.0,72.8,11.0],["We did all that we could to try and win the project. We wrote",2.0,93.5,11.0],["letters, asked friends in the entertainment industry to put in a",2.0,105.5,11.0],["good word, and eventually were given a chance to present our",2.0,117.6,11.0],["portfolio to her manager. She liked what she saw and we armed",2.0,129.7,11.0],["her with CD-ROMs and websites to show Madonna. We were",2.0,141.7,11.0],["awarded the project.",2.0,153.8,11.0],["We had to move quickly. It was mid-July and the first phase of",2.0,176.5,11.0],["the project had to be launched by August 4th, the same day the",2.0,188.6,11.0],["first single was released to radio. MTV and VH1 were promoting",2.0,200.6,11.0],["the album, the single and (gulp) the new website around the clock.",2.0,212.7,11.0],["Pressure was mounting.",2.0,224.7,11.0],["We conceived the idea of creating a music mixer in Flash, and we",2.0,250.5,11.0],["went about designing and programming at a furious pace. We would",2.0,262.6,11.0],["check in with Madonna's camp on a near daily basis by sending",2.0,274.6,11.0],["overnight packages and secret web addresses. They would report",2.0,286.6,11.0],["back positive feedback from Madonna herself. It was an exciting time",2.0,298.7,11.0],["for everyone involved with the project.",2.0,310.8,11.0],["When the mixer site was posted, it had an overwhelmingly positive",2.0,335.4,11.0],["response from fans around the world. As might be expected of",2.0,347.4,11.0],["Madonna fans, thousands of emails were sent offering praise,",2.0,359.5,11.0],["admiration and congratulations. We had little time to celebrate and",2.0,371.6,11.0],["began work immediately on the \"official\" album site. Just upon",2.0,383.6,11.0],["completion, we were given an opportunity to present the final piece",2.0,395.6,11.0],["to Madonna in person, which was a great honor.",2.0,407.7,11.0]],"federatedText":[["This project was created way back in 1998. Federated was preparing",2.0,12.5,11.0],["to launch a new bath and body line called Souson, which they would",2.0,24.6,11.0],["sell exclusively in Federated department stores. A dedicated group of",2.0,36.6,11.0],["people in their cosmetics division had conceived the line and written",2.0,48.6,11.0],["TO LAUNCH",-241.7,50.0,10.0],["CLICK",-194.9,50.0,10.0],["a business plan, with branding and package design ideas. They were",2.0,60.7,11.0],["preparing to make internal presentations to company executives.",2.0,72.8,11.0],["They became aware of Firstborn by word of mouth. The Federated",2.0,95.5,11.0],["Senior VP of Cosmetics was friendly with the CEO of one of our",2.0,107.5,11.0],["clients. When discussing the launch of her new project, the subject",2.0,119.6,11.0],["of presentations came up.  It was recommended to her that she see",2.0,131.7,11.0],["some of the things we were doing.",2.0,143.7,11.0],["We met with her and discussed her goals. She needed to cover",2.0,167.5,11.0],["basic information about the line, including business objectives",2.0,179.6,11.0],["and strategies. But she also needed to convey an important part",2.0,191.6,11.0],["of the concept, which revolved around 11 products made up of a",2.0,203.7,11.0],["combination of colors and fragrances. It needed to be strong visually.",2.0,215.7,11.0],["Her first meeting was met with rave reviews. She went on",2.0,238.5,11.0],["to give successful presentations and people were asking her",2.0,250.6,11.0],["for copies of the interactive piece. They found it to be helpful in",2.0,262.6,11.0],["sharing information about the Souson launch with colleagues.",2.0,274.6,11.0],["CD-ROMs were duplicated and it was ultimately shared with the",2.0,286.7,11.0],["press, merchandising managers, retailers and beauty advisors.",2.0,298.8,11.0]],"calvinKleinText":[["Calvin Klein is a company that is concerned with consistent",2.0,12.5,11.0],["presentation of its brand. They rely heavily on retail partners to adhere",2.0,24.6,11.0],["to the merchandising designs that are put in place each season.",2.0,36.6,11.0],["Twice",2.0,36.6,11.0],["a year, department store employees receive merchandising manuals,",2.0,48.6,11.0],["TO LAUNCH",-241.7,50.0,10.0],["CLICK",-194.9,50.0,10.0],["or as Calvin calls them, Visual Merchandising Directives. They are filled",2.0,60.7,11.0],["with step-by-step instructions and photographic examples that are",2.0,72.8,11.0],["used during the stages of setting up a new retail environment.",2.0,84.8,11.0],["In an effort to train these people more effectively, Calvin asked us to",2.0,107.5,11.0],["create a multimedia version of the same information. We studied the",2.0,119.5,11.0],["existing materials and designed interactive ways of illustrating the",2.0,131.6,11.0],["standards. We incorporated the seasonal ad looks and overall brand",2.0,143.7,11.0],["creative direction in the design.",2.0,155.7,11.0],["Merchandisers can request a CD-ROM of seasonal standards for",2.0,179.5,11.0],["window displays, mannequin placements, folding techniques and",2.0,191.6,11.0],["other pertinent, timely information. And more recently, department",2.0,203.6,11.0],["stores and other retailers have access to the Visual Merchandising",2.0,215.7,11.0],["Directives via a password protected extranet site.",2.0,227.7,11.0]],"ourPortfolioText":[["We're very proud of our portfolio. It's been a prolific four",-303.0,12.5,11.0],["years. By browsing through this section, you can take a",-299.7,24.6,11.0],["look at most of our web-based work in its entirety, as well",-311.2,36.6,11.0],["as screen shots from CD-ROMs and laptop presentations.",-312.3,48.6,11.0],["CLICK    TO DOWNLOAD THE FIRSTBORN PORTFOLIO BOOK",-443.9,201.1,14.0],["(printer-friendly, 86 pages, 3MB .zip archive)",-74.8,201.2,12.0]],"contactUsText":[["Please feel free to contact us if you're interested in discussing",-312.0,12.5,11.0],["a potential project, or if you're interested in working at Firstborn.",-323.7,24.6,11.0],["In either case, we'd be happy to hear from you.",-235.1,36.6,11.0]],"addressText":[["We're located at 630 9th Avenue in New York City,",2.0,12.5,11.0],["which is between 44th and 45th Streets. Our zip code",2.0,25.1,11.0],["is 10036. We are about two blocks away from Times",2.0,37.6,11.0],["Square. We have three offices, Suites 605, 606 and 401.",2.0,50.1,11.0],["All correspondence should be sent to Suite 605.",2.0,75.2,11.0]],"emailText":[["You can email us at any of the following addresses:",2.0,12.5,11.0],["info@firstbornmultimedia.com",2.0,25.1,11.0],["sales@firstbornmultimedia.com",2.0,37.6,11.0],["work@firstbornmultimedia.com",2.0,50.1,11.0],["creativedirector@firstbornmultimedia.com",2.0,62.7,11.0]],"phoneText":[["Our phone number is 212-581-1100.",2.0,12.5,11.0]]};

/* ===== scaleEase / easeIn — the decompiled primitives, verbatim ===== */
function scaleEase(o, dt60){       // o:{s, goal, speed?}
  const mod = o.speed || P.speed;
  const diff = o.goal - o.s;
  if (P.mode==='fb03'){
    if (Math.abs(diff) > 1) o.s += (diff/mod)*dt60;
    else o.s = o.goal;
  } else {                          // spring A/B mode
    o.vs=(o.vs||0); const f=diff*P.k*0.06;
    o.vs=(o.vs+f*dt60)*Math.max(0,1-P.c*0.016*dt60);
    o.s+=o.vs*dt60*0.06*10;
    if (Math.abs(diff)<0.5 && Math.abs(o.vs)<0.5){ o.s=o.goal; o.vs=0; }
  }
}
function easeIn(o, prop, goal, dt60){
  const diff = goal - o[prop];
  if (P.mode==='fb03'){
    if (Math.abs(diff) > 1) o[prop] += (diff/P.speed)*dt60;
    else o[prop] = goal;
  } else {
    const vk='v'+prop; o[vk]=(o[vk]||0);
    const f=diff*P.k*0.06;
    o[vk]=(o[vk]+f*dt60)*Math.max(0,1-P.c*0.016*dt60);
    o[prop]+=o[vk]*dt60*0.06*10;
    if (Math.abs(diff)<0.5 && Math.abs(o[vk])<0.5){ o[prop]=goal; o[vk]=0; }
  }
}

function makeItem(node, parentEl, onClick){
  const el=document.createElement('div');
  el.className='it';
  const met = SIZERS[node.mk] || null;
  const b=document.createElement('b'); b.textContent=node.label;
  el.appendChild(b);
  el.style.color = node.red ? K.red : K.grey;
  parentEl.appendChild(el);
  const o={ el, node, x:0, y:0, s:0, goal:100, w:0, h:0, baseColor: node.red?K.red:K.grey };
  if (met){
    o.w=met.w; o.h=met.h;
    el.style.width=met.w+'px';
    const tl=(Math.abs(met.tl)<6 ? met.tl : 0);   // multi-text symbols report junk; glyphs start at 0
    b.style.left=tl+'px'; b.style.top='-6.1px';
  } else {
    o.w=Math.max(40, b.offsetWidth-10); o.h=20;
    el.style.width=o.w+'px';
    b.style.left='0px'; b.style.top='-6.1px';
  }
  el.addEventListener('click', e=>{ e.stopPropagation(); onClick(o); });
  if (window.__calibrate) requestAnimationFrame(()=>window.__calibrate(o));
  el.addEventListener('pointerenter', ()=> el.style.color=K.hover);
  el.addEventListener('pointerleave', ()=> el.style.color=o.baseColor);
  return o;
}
function setColor(o,c){ o.baseColor=c; o.el.style.color=c; }

  mains.forEach((o,i)=>{ o.x=0; o.xGoal=-o.w; o.y=0; o.s=100; });

function buildSub(node){
  removeBox(sub, subs); removeBox(subsub, subsubs); subsub=null; subsubs=[];

  const mo=mains[mSel];
  sub={ el, x:0, y: mo.y + mo.h + K.sLeading, s:0, goal:K.newcomer };
  subs=(node.children||[]).map((n,i)=> makeItem(n, el, ()=>subRelease(i)));
  subs.forEach(o=>{ o.s=100; });   // items live at full scale; the CONTAINER grows in
  chainYs(subs);
  apply(sub);
}
function buildSubSub(node){
  removeBox(subsub, subsubs);

function removeBox(box, items){ if(box){ box.el.remove(); } items.length=0; }

/* placeMainNav — verbatim splice logic (evaluated at click time,
   when the fresh sub block still has ~zero height — so the main stack
   stays tight, exactly like the original) */
function placeMainNav(){
  for(let i=1;i<mains.length;i++)
    mains[i].y = mains[i-1].y + mains[i-1].h*(mains[i-1].s/100) + K.mLeading;
}
function chainYs(items){
  for(let i=1;i<items.length;i++)
    items[i].y = items[i-1].y + items[i-1].h*(items[i-1].s/100) + K.navSpace;
}

/* ===== the switch functions — goals verbatim from the decompile ===== */
function scaleNavObj(l,m,s,ss){
  logo.goal=l; main.goal=m;
  if(sub) sub.goal=s;
  if(subsub) subsub.goal=ss;
}
function currentSil(){
  const chain=[];
  if (mSel>=0) chain.push(TREE[mSel]);
  if (mSel>=0 && sSel>=0 && TREE[mSel].children) chain.push(TREE[mSel].children[sSel]);
  if (mSel>=0 && sSel>=0 && ssSel>=0 && TREE[mSel].children[sSel].children) chain.push(TREE[mSel].children[sSel].children[ssSel]);
  let mode='';
  for(const n of chain){ if(n.sil) mode=n.sil; else if(mode && !n.sil && n!==chain[0]) mode=mode; }
  // outside the WHO WE ARE branch entirely → hide
  if (!(mSel>=0 && TREE[mSel].sil)) mode='';
  return mode;
}
function logoRelease(){
  clickMode='logo'; mSel=-1; sSel=-1; ssSel=-1;
  pendSub=null; pendSubSub=null;
  retire(subsub); subsub=null; subsubs=[];
  retire(sub); sub=null; subs=[];
  scaleNavObj(K.logoHome, 100, 0, 0);
  mains.forEach(o=>{ o.goal=100; setColor(o, o.node.red?K.red:K.grey); });
  removeContent(); setFieldMood('home');

}
let seq=null, seqS=null;   // main-level and sub-level switch sequences
function startSwitch(newI){
  seq={phase:'retract', oldM:mSel, newM:newI};
  pendSub=null; pendSubSub=null; seqS=null;
  if (subsub) subsub.goal=0;
  if (sub) sub.goal=0;
  removeContent();
}
function finishHome(){
  clickMode='logo'; mSel=-1; sSel=-1; ssSel=-1;
  scaleNavObj(K.logoHome, 100, 0, 0);
  mains.forEach(o=>{ o.goal=100; setColor(o, o.node.red?K.red:K.grey); });
  silState(''); setFieldMood('home');
}
function mainRelease(i){
  const node=TREE[i];
  if (seq){ seq.newM = (seq.oldM===i ? null : i); return; }   // retarget mid-sequence
  const open = sub || pendSub || subsub;
  if (mSel===i && open){ startSwitch(null); return; }         // toggle shut, sequenced
  if (mSel>=0 && mSel!==i && open){ startSwitch(i); return; } // branch switch, sequenced
  applyMain(i);
}
function applyMain(i){
  const node=TREE[i];
  mSel=i; sSel=-1; ssSel=-1; clickMode='main';
  removeContent();
  pendSub=null; pendSubSub=null;
  retire(subsub); subsub=null; subsubs=[];
  retire(sub); sub=null; subs=[];
  scaleNavObj(K.logoOpen, K.ladder*100, 0, 0);
  mains.forEach((o,j)=>{
    o.goal = j===i ? K.selected : K.sibling;
    setColor(o, j===i ? (node.red?K.red:K.black) : (o.node.red?K.red:K.grey));
  });
  if (node.children) pendSub = node;         // cascades once the ghost lands (navRun:918)
  else mains[i].goal=K.leaf;
  contentPending = (node.copy||node.chips||node.ck) ? {node, at:'main'} : null;
  setFieldMood(node.label==='OUR PORTFOLIO' ? 'portfolio' : 'dim');
  silState(currentSil());
}
function subRelease(i){
  if (seq) return;
  if (subsub && sSel!==i){ seqS={newS:i}; subsub.goal=0; removeContent(); return; }
  applySub(i);
}
function applySub(i){
  const node=TREE[mSel].children[i];
  sSel=i; ssSel=-1; clickMode='sub';
  removeContent();
  subs.forEach((o,j)=>{
    setColor(o, j===i ? (o.node.red?K.red:K.black) : (o.node.red?K.red:K.grey));
    o.goal = j===i ? (node.children?K.selected:K.leaf) : K.sibling;
  });
  pendSubSub=null;
  retire(subsub); subsub=null; subsubs=[];
  scaleNavObj(K.logoOpen, K.ladder*K.ladder*100, K.newcomer, 0);
  if (node.children) pendSubSub = node;
  if (node.layout){ curLayout=node.layout; layouts[curLayout](); setFieldMood('portfolio'); }
  else if (TREE[mSel].label!=='OUR PORTFOLIO') setFieldMood('dim');
  contentPending = (node.copy||node.chips) ? {node, at:'sub'} : null;
  silState(currentSil());
}
function subsubRelease(i){
  const node=TREE[mSel].children[sSel].children[i];
  ssSel=i; clickMode='subsub';
  removeContent();
  scaleNavObj(K.logoOpen, K.ladder*K.ladder*K.ladder*100, K.newcomer, K.newcomer);
  subsubs.forEach((o,j)=>{
    setColor(o, j===i ? (o.node.red?K.red:K.black) : (o.node.red?K.red:K.grey));
    o.goal = j===i ? K.leaf : K.sibling;
  });
  contentPending = (node.copy||node.chips) ? {node, at:'subsub'} : null;
  silState(currentSil());
}

/* ===== content (addContent/removeContent: scale pop, speed/2) ===== */
function removeContent(){ content.goal=0; contentShown=null; }
function renderChips(node){
  contentEl.innerHTML='';
  const chipBox=document.createElement('div'); chipBox.className='chips';
  const txt=document.createElement('div'); txt.className='ctext';
  contentEl.appendChild(chipBox); contentEl.appendChild(txt);
  node.chips.forEach((c,i)=>{
    const b=document.createElement('b'); b.textContent=c.label;
    if(i===0) b.classList.add('on');
    b.addEventListener('click',()=>{
      const all=[...chipBox.querySelectorAll('b')];
      all.forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      const sel=all.indexOf(b);
      all.forEach((x,j)=>{ x.style.top = (j===sel?0:(j<sel? -(sel-j)*2 : (j-sel)*2))+'px'; });
      content.s=0;                     // re-pop, like the original swap
      txt.textContent=c.copy;
    });
    chipBox.appendChild(b);
  });
  txt.textContent=node.chips[0].copy;
}
function addContent(pend){
  if (pend.node.chips) renderChips(pend.node);
  else if (pend.node.ck && CL[pend.node.ck]){
    contentEl.innerHTML='';
    contentEl.style.textAlign='left';
    for (const [t,x,y,fs] of CL[pend.node.ck]){
      const el=document.createElement('div');
      el.className='cl'; el.textContent=t;
      el.style.left=x+'px'; el.style.top=y+'px'; el.style.fontSize=fs+'px';
      contentEl.appendChild(el);
    }
  }
  else contentEl.textContent = pend.node.copy;
  if (!(pend.node.ck && CL[pend.node.ck])) contentEl.style.textAlign = (pend.at==='main' && !pend.node.chips) ? 'right' : 'left';
  if (pend.node.ck==='whoWeAreText'){
    // the crowd ships inside the whoWeAreText symbol — shape 377 at (63.6,165.8)
    const im=document.createElement('img');
    im.src='assets/crowd.svg'; im.draggable=false;
    im.style.cssText='position:absolute;left:32.5px;top:103.6px;width:150.2px;height:191.7px;pointer-events:none';
    contentEl.appendChild(im);
  }
  if (pend.node.cX!==undefined){
    content.x = logo.x + pend.node.cX;
    content.y = logo.y + pend.node.cY;
    content.s=0; content.goal=100; contentShown=pend.node;
    return;
  }
  // place beside/below the deepest column, in nav-local coords
  let x=0,y=0;
  if (pend.at==='subsub' && subsub){
    x = subXAbs() + (subsub.xGoal ?? subsub.x)*absScale(sub)/100 + 10;
    y = subYAbs() + (subsub.y + colH(subsubs)*(subsub.s/100))*absScale(sub)/100 + 14;
  } else if (pend.at==='sub' && sub){
    x = subXAbs() - (pend.at==='main' ? 46 : -6);
    y = subYAbs() + colH(subs)*absScale(sub)/100 + 26;
  } else {
    x = main.x + 6; y = main.y + colH(mains)*(main.s/100) + 16;
  }
  content.x=x; content.y=y; content.s=0; content.goal=100;
  contentShown=pend.node;
}
const absScale = box => (main.s/100)*(box?box.s:100);
const subXAbs = ()=> main.x + (sub? sub.x*(main.s/100):0);
const subYAbs = ()=> main.y + (sub? sub.y*(main.s/100):0);
const colH = items => items.length? items[items.length-1].y + items[items.length-1].h*(items[items.length-1].s/100) : 0;

/* ===== apply transforms ===== */
function apply(o){
  o.el.style.transform = 'translate('+o.x+'px,'+o.y+'px) scale('+(Math.max(0,o.s)/100)+')';
}

/* ===== navRun — the master tick, 60Hz fixed-step, rules verbatim ===== */
let pendSub=null, pendSubSub=null, dying=[];   // deferred cascades + retracting boxes
function navTick(dt60){
  // ---- switch sequences (aniMode: subRetract -> expand) ----
  if (seq){
    if (seq.phase==='retract'){
      const gone = (!sub || sub.s<=0.5) && (!subsub || subsub.s<=0.5);
      if (gone){
        if (subsub){ subsub.el.remove(); subsub=null; subsubs=[]; }
        if (sub){ sub.el.remove(); sub=null; subs=[]; }
        const o=mains[seq.oldM];
        o.goal=100; setColor(o, o.node.red?K.red:K.grey);   // ghost tucks back
        sSel=-1; ssSel=-1;
        seq.phase='tuck';
      }
    } else if (seq.phase==='tuck'){
      const o=mains[seq.oldM];
      const tx=-(o.w*o.s/100);
      if (Math.abs(o.x-tx)<2 && Math.abs(o.s-o.goal)<1){
        const target=seq.newM; seq=null;
        if (target==null) finishHome();
        else applyMain(target);
      }
    }
  }
  if (seqS && subsub && subsub.s<=0.5){
    subsub.el.remove(); subsub=null; subsubs=[];
    const t=seqS.newS; seqS=null; applySub(t);
  }
  scaleEase(logo, dt60); scaleEase(main, dt60);

  // the stack top tracks the logo's bottom edge; its x eases toward the
  // logo's right edge — the whole column rides the shrinking logo (navRun:903,894)
  main.y = logo.y + logo.h*(logo.s/100);
  easeIn(main, 'x', logo.x + logo.w*(logo.s/100), dt60);

  // main items: follow-the-leader chain with EASING — the ripple (navRun:914)
  const selIdx = (seq && seq.phase==='tuck') ? -1 : mSel;   // tucking ghost is no longer "out"
  mains.forEach((o,i)=>{
    scaleEase(o,dt60);
    const xg = P.justify==='R'
      ? ((i===selIdx) ? K.mainOffset : -(o.w*o.s/100))   // original: right-justified (navRun:911)
      : ((i===selIdx) ? -K.mainOffset : 0);              // tool mode: left-justified mirror
    easeIn(o,'x',xg,dt60);
    if (i>0){
      const p=mains[i-1];
      easeIn(o,'y', p.y + p.h*(p.s/100) + K.mLeading, dt60);
    }
  });

  // sub cascades only once the ghost ARRIVES at mainOffset (navRun:918-921)
  if (pendSub && mSel>=0 && mains[mSel].x===K.mainOffset){
    buildSub(pendSub); sub.goal=K.newcomer; pendSub=null;
  }
  if (sub){
    scaleEase(sub,dt60); subs.forEach(o=>scaleEase(o,dt60)); chainYs(subs);
    // the child column hangs off the ghost's right edge − horOffset (navRun:923)
    const g=mains[mSel];
    if (g){ sub.x = g.x + g.w - K.horOffset;
            sub.y = g.y + g.h*(g.s/100) + K.sLeading; }
  }
  // subsub cascades once the selected sub item settles (symmetry w/ navRun)
  if (pendSubSub && sSel>=0 && subs[sSel] && subs[sSel].s===subs[sSel].goal){
    buildSubSub(pendSubSub); subsub.goal=K.newcomer; pendSubSub=null;
  }
  if (subsub){
    scaleEase(subsub,dt60); easeIn(subsub,'x',subsub.xGoal,dt60);
    subsubs.forEach(o=>scaleEase(o,dt60)); chainYs(subsubs);
    if (sSel>=0 && subs[sSel]){
      subsub.y = subs[sSel].y + subs[sSel].h*(subs[sSel].s/100) + K.navSpace;
      subsub.xGoal = subs[sSel].x + subs[sSel].w - K.horOffset;
    }
    // sub items after the selected: first one eases below the block, rest chain (navRun:944-948)
    for(let i=sSel+1;i<subs.length;i++){
      if (i===sSel+1){
        const gy = subsub.y + colH(subsubs)*(subsub.s/100) + K.navSpace;
        easeIn(subs[i],'y',gy,dt60);
      } else {
        const p=subs[i-1];
        subs[i].y = p.y + p.h*(p.s/100) + K.navSpace;
      }
    }
  }
  // retracting boxes ease to 0 then unload (aniMode subRetract)
  dying = dying.filter(box=>{
    scaleEase(box,dt60); apply(box);
    if (box.s<=0.5){ box.el.remove(); return false; }
    return true;
  });

  scaleEase(content, dt60);
  scaleEase(sil, dt60); apply(sil);
  // threshold choreography: content pops once the nav has settled
  if (contentPending){
    const settled = !pendSub && !pendSubSub
      && atGoal(logo)&&atGoal(main)&&mains.every(atGoal)
      && (!sub || (atGoal(sub)&&subs.every(atGoal)))
      && (!subsub || (atGoal(subsub)&&subsubs.every(atGoal)));
    if (settled){ addContent(contentPending); contentPending=null; }
  }
  // render
  apply(logo); apply(main); mains.forEach(apply);
  if (sub){ apply(sub); subs.forEach(apply); }
  if (subsub){ apply(subsub); subsubs.forEach(apply); }
  apply(content);
}
const atGoal = o => o.s===o.goal;
function retire(box){ if(!box) return; box.goal=0; box.speed=P.speed/1.5; dying.push(box); }

/* ===== true stage mapping: 800x650 showAll, nav sprite at (105,60) ===== */
let stageK=1, stageOX=0, stageOY=0;
function anchorNav(){
  stageK = Math.min(innerWidth/K.stageW, innerHeight/K.stageH);
  stageOX = (innerWidth - K.stageW*stageK)/2;
  stageOY = (innerHeight - K.stageH*stageK)/2;
  navEl.style.left = (stageOX + K.navX*stageK)+'px';
  navEl.style.top  = (stageOY + K.navY*stageK)+'px';
  navEl.style.transform = 'scale('+stageK+')';
  navEl.style.transformOrigin = '0 0';
  const fx=document.getElementById('furniture');
  fx.style.left=stageOX+'px'; fx.style.top=stageOY+'px';
  fx.style.transform='scale('+stageK+')';
  logo.x=0; logo.y=0;        // fbLogo attaches at nav-local (0,0) — allData
  main.x=0; main.y=0;        // driven per-frame by navRun rules
}

/* =====================================================================
   the thumbnail field (unchanged from v2)
   ===================================================================== */
const IDS = ['012','014','016','018','020','022','024','026','028','030','032','034','036','038','040',
'042','044','046','048','050','052','054','056','058','060','062','064','066','070','072','074','076',
'078','080','082','084','086','088','090','092','094','096','098','100','102','104','106','108','110',
'112','114','116','118','122','124','126','128','130','132','134','136','138','146','148','150','152',
'154','156','158','160','162','164','166','170','172','174','178','184','186','188','190','196','198',
'200','202','204','206','208','212','216','218','220','222','224','226','228','230','232','234','236',
'238','240','242','244','248','250','254','256','258'];
const TW = 66, TH = 31;
const cv = document.getElementById('field'), cx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cx.setTransform(DPR,0,0,DPR,0,0);
  anchorNav();
}
addEventListener('resize', ()=>{ resize(); layouts[curLayout](); });

let seed = 20031107;
const rnd = () => (seed = (seed*1664525+1013904223)>>>0, seed/4294967296);
const parts = IDS.map((id,i)=>{
  const img = new Image(); img.src = 'assets/t'+id+'.jpg';
  return { img, i, x:0, y:0, vx:0, vy:0, hx:0, hy:0, b:0.2, s:1 };
});
function safeZone(x,y){ return x > 0.06*W && x < 0.42*W && y > 0.22*H && y < 0.8*H; }
const layouts = {
  scatter(){ clearFieldLabels(); parts.forEach(p=>{
    let x,y,tries=0;
    do { x=30+rnd()*(W-60); y=60+rnd()*(H-120); tries++; } while (safeZone(x,y)&&tries<40);
    p.hx=x; p.hy=y; });},
  client(){ clearFieldLabels(); grid(parts.slice().sort((a,b)=>a.i-b.i)); },
  chrono(){ clearFieldLabels(); grid(parts.slice().sort((a,b)=>b.i-a.i)); },
  type(){ // grouped grid with category labels, like portfolio.swf's byProjectType
    const stage=(x,y)=>[stageOX+(K.navX+x)*stageK, stageOY+(K.navY+y)*stageK];
    const GROUPS=[['MARKETING',0,0,9],['COMMUNICATIONS',252,0,4],['SALES',364,0,3],['TRAINING',460,0,2]];
    clearFieldLabels();
    let gi=0, counts=[0,0,0,0];
    parts.forEach((p,j)=>{ counts[j%7<4?0:(j%7<5?1:(j%7<6?2:3))]++; });
    const idx=[0,0,0,0];
    parts.forEach((p,j)=>{
      const g = j%7<4?0:(j%7<5?1:(j%7<6?2:3));
      const [label,gx,gy,cols]=GROUPS[g];
      const i=idx[g]++;
      const [sx,sy]=stage(135+gx+(i%cols)*(TW*0.42+3), 275+gy+Math.floor(i/cols)*(TH*0.42+3));
      p.hx=sx; p.hy=sy;
    });
    GROUPS.forEach(([label,gx])=>{
      const [lx,ly]=stage(135+gx, 262);
      addFieldLabel(label, lx, ly);
    });
  },
  media(){ clearFieldLabels(); const rows=4;
    parts.forEach((p,j)=>{ const r=j%rows, n=Math.ceil(parts.length/rows), k=Math.floor(j/rows);
      p.hx = 0.48*W + (k/(n-1))*0.48*W;
      p.hy = 0.22*H + r*(0.56*H/(rows-1)) + (rnd()-0.5)*8; }); },
};
function grid(sorted){
  const cols = Math.max(6, Math.round(Math.sqrt(sorted.length*(W*0.48)/(H*0.7)/(TW/TH))));
  const rows = Math.ceil(sorted.length/cols);
  const gw = Math.min(0.48*W, cols*(TW+10)), gh = Math.min(0.72*H, rows*(TH+10));
  const x0 = 0.5*W, y0 = (H-gh)/2;
  sorted.forEach((p,j)=>{
    p.hx = x0 + (j%cols)*(gw/(cols-1||1));
    p.hy = y0 + Math.floor(j/cols)*(gh/(rows-1||1)); });
}
let curLayout='scatter';
resize();
layouts.scatter();
parts.forEach(p=>{ p.x=p.hx; p.y=p.hy; });

let fieldMood='home', fieldScale=1;
function setFieldMood(m){ fieldMood=m; }
function fieldLabelBox(){
  let lb=document.getElementById('fieldLabels');
  if(!lb){ lb=document.createElement('div'); lb.id='fieldLabels';
    lb.style.cssText='position:fixed;inset:0;z-index:3;pointer-events:none';
    document.body.appendChild(lb); }
  return lb;
}
function clearFieldLabels(){ fieldLabelBox().innerHTML=''; }
function addFieldLabel(t,x,y){
  const el=document.createElement('div');
  el.textContent=t;
  el.style.cssText='position:absolute;font:400 '+(10*stageK)+'px FBBody,Helvetica;letter-spacing:.06em;color:#88867f;left:'+x+'px;top:'+(y-12*stageK)+'px';
  fieldLabelBox().appendChild(el);
}
const moodBase = ()=> fieldMood==='dim' ? 0.0 : (fieldMood==='portfolio' ? 0.26 : 0.18);

const mouse = { x:-9e3, y:-9e3 };
addEventListener('pointermove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
addEventListener('pointerleave', ()=>{ mouse.x=-9e3; mouse.y=-9e3; });
const easeOut = t => 1-Math.pow(1-t,3);

function fieldTick(dt){
  const t = performance.now()/1000;
  cx.clearRect(0,0,W,H);
  const base = moodBase();
  for(const p of parts){
    const drift = curLayout==='scatter' ? 1 : 0.15;   // grids sit still, like portfolio.swf
    const dx0=Math.sin(t*0.35+p.i*1.7)*7*drift, dy0=Math.cos(t*0.28+p.i*2.3)*5*drift;
    const tx=p.hx+dx0, ty=p.hy+dy0;
    if (P.mode==='spring'){
      let fx=(tx-p.x)*Math.min(P.k,140), fy=(ty-p.y)*Math.min(P.k,140);
      const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md=Math.hypot(mdx,mdy);
      if (fieldMood!=='dim' && md<P.repel && md>0.01){
        const f=(1-md/P.repel)*2600; fx+=mdx/md*f; fy+=mdy/md*f;
      }
      p.vx=(p.vx+fx*dt)*Math.max(0,1-Math.min(P.c,16)*dt);
      p.vy=(p.vy+fy*dt)*Math.max(0,1-Math.min(P.c,16)*dt);
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    } else {   // '03 mode: easeIn on positions, mouse repel nudges the goal
      let gx=tx, gy=ty;
      const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md=Math.hypot(mdx,mdy);
      if (fieldMood!=='dim' && md<P.repel && md>0.01){
        const push=(1-md/P.repel)*60; gx+=mdx/md*push; gy+=mdy/md*push;
      }
      p.x += (gx-p.x)/(P.speed*2) * dt*60;
      p.y += (gy-p.y)/(P.speed*2) * dt*60;
    }
    const md=Math.hypot(p.x-mouse.x,p.y-mouse.y);
    const near=fieldMood==='dim'?0:Math.max(0,1-md/170);
    const tb=base+easeOut(near)*(1-base), ts=1+easeOut(near)*0.55;
    p.b+=(tb-p.b)*Math.min(1,10*dt);
    p.s+=(ts-p.s)*Math.min(1,10*dt);
    if (p.img.complete&&p.img.naturalWidth){
      const k2 = ((curLayout==='type') ? 0.42 : 0.55) * stageK;   // stage-scaled, like portfolio.swf
      const w=TW*p.s*k2, h=TH*p.s*k2;
      cx.globalAlpha=p.b;
      cx.drawImage(p.img,p.x-w/2,p.y-h/2,w,h);
    }
  }
  cx.globalAlpha=1;
}

/* ===== master loop: fixed 60Hz for the nav (like the SWF), dt for field ===== */
let last = performance.now(), acc = 0;
function frame(now){
  let dt = Math.min(0.05,(now-last)/1000); last=now;
  acc += dt;
  const STEP = 1/60;
  let n = 0;
  while (acc >= STEP && n < 5){ navTick(1); acc -= STEP; n++; }
  fieldTick(dt);
  requestAnimationFrame(frame);
}

/* ===== boot ===== */
buildMain();
/* deep link parity: the original (siteSize=1) auto-opens OUR PORTFOLIO > BY THUMBNAIL */
if (new URLSearchParams(location.search).get('boot')==='portfolio'){
  setTimeout(()=>{ mainRelease(3); setTimeout(()=>{ if(subs[4]) subRelease(4); }, 1400); }, 900);
}
/* calibrate label glyph-runs to the decoded Flash text widths (pixel-true) */
document.fonts.ready.then(()=>{
  window.__calibrate=o=>{
    const met=SIZERS[o.node.mk]; if(!met||!met.tw) return;
    const b=o.el.querySelector('b');
    b.style.transform='';
    const w=b.offsetWidth;
    if (w>4) b.style.transform='scaleX('+(met.tw/w).toFixed(4)+')';
  };
  mains.forEach(window.__calibrate);
  subs.forEach(window.__calibrate);
  subsubs.forEach(window.__calibrate);
});
logoEl.addEventListener('click', logoRelease);
requestAnimationFrame(frame);

/* ===== controls ===== */
document.querySelectorAll('#mode b').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#mode b').forEach(o=>o.classList.remove('on'));
    b.classList.add('on'); P.mode=b.dataset.m;
  });
});
const bind=(id,key)=>{
  const el=document.getElementById(id), v=document.getElementById(id+'V');
  el.addEventListener('input', ()=>{ P[key]=+el.value; v.textContent=el.value; });
};
bind('speed','speed'); bind('stiff','k'); bind('repel','repel');
document.querySelectorAll('#justify b').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#justify b').forEach(o=>o.classList.remove('on'));
    b.classList.add('on'); P.justify=b.dataset.j;
  });
});
