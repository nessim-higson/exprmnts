<style>
  :root{ --ink:#000; --white:#ece9e3; --mute:#96948c; --faint:#5a5852;
         --hairline:#26251f; --crimson:#e03a30 }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{background:var(--ink); color:var(--white); overflow:hidden;
    font:15px/1.4 "Helvetica Neue",-apple-system,Helvetica,Arial,sans-serif;

  canvas{position:fixed; inset:0; display:block; width:100%; height:100%}

  .crumb{position:fixed; top:22px; left:26px; z-index:5; color:var(--faint);
    font-size:11px; font-weight:600; letter-spacing:.22em; text-transform:uppercase}
  .crumb a{color:var(--faint); text-decoration:none}
  .crumb a:hover{color:var(--white)}

  /* ------- the type engine (ported from the decompiled 2003 AS2) ------- */
  #nav{position:fixed; z-index:4; user-select:none}
  #nav .box{position:absolute; transform-origin:0 0; will-change:transform}
  #nav .it{position:absolute; transform-origin:0 0; will-change:transform;
    font-weight:700; font-size:16px; line-height:1; letter-spacing:.01em;
    white-space:nowrap; cursor:pointer; color:#999}
  #logo{position:absolute; transform-origin:0 0; will-change:transform; cursor:pointer;
    font-weight:400; font-size:34px; line-height:1; letter-spacing:.42em; color:#8f8d86}

  /* ------- control strip ------- */
  #ctl{position:fixed; right:22px; bottom:20px; z-index:6; display:flex; align-items:center; gap:18px;
    padding:12px 16px; border:1px solid var(--hairline); background:rgba(0,0,0,.72);
    font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  #ctl .seg{display:flex; border:1px solid var(--hairline)}
  #ctl .seg b{padding:7px 12px; cursor:pointer; font-weight:700; color:var(--faint)}
  #ctl .seg b.on{background:var(--white); color:#000}
  #ctl label{display:flex; align-items:center; gap:8px}
  #ctl input[type=range]{width:82px; accent-color:#ece9e3; height:2px}
  #ctl .val{min-width:26px; color:var(--mute); font-variant-numeric:tabular-nums}

  footer{position:fixed; left:26px; bottom:22px; z-index:5; color:var(--faint); font-size:10px;
    letter-spacing:.2em; text-transform:uppercase}
  @media(max-width:820px){ #ctl{right:12px; bottom:64px; flex-wrap:wrap; max-width:70vw} }

<div id="nav">

<div class="crumb"><a href="/">exprmnts</a> &nbsp;/&nbsp; 002 · text nav, rebuilt</div>

  </div>
  <label>Speed <input type="range" id="speed" min="1.5" max="8" step="0.5" value="3"><span class="val" id="speedV">3</span></label>

<script>
/* =====================================================================
   THE TREE — edit freely. label / red / copy / children / layout.
   Copy transcribed from the 2003 original where recoverable.
   ===================================================================== */
const TREE = [
 { label:'WHO WE ARE',
   copy:"Firstborn is a talented and imaginative interactive agency founded in New York City in 1997. Our story is one of hard work, determination and a strong desire to create the best user experiences possible. Our team specializes in producing digital, interactive designs for high-profile clients mainly in fashion, cosmetics, sports and entertainment.",
   children:[
     { label:'PRINCIPALS' },
     { label:'DESIGN PHILOSOPHY' },
     { label:'BUSINESS PHILOSOPHY' },
     { label:'HISTORY' },
 ]},
 { label:'WHAT WE DO',
   copy:"Firstborn creates digital design projects that corporate clients use in many areas of their businesses. Our work helps heavily branded companies more effectively sell, market, train and communicate, via the computer. Generally, this means we make websites, intranet sites, and laptop and CD-ROM presentations.",
   children:[
     { label:'THE BASICS',
       copy:"We don't do extended consulting, market research, usability testing, or focus groups. That may be worth repeating. We don't do focus groups. We limit usability testing to our staff and our client's staff. We envision, manage, DESIGN, program and deliver." },
     { label:'TYPES OF PROJECTS',
       copy:"There are many ways of using \"new media\" to improve basic needs in everyday business. All businesses strive to communicate more clearly, more efficiently and more cost-effectively with their employees, clients and potential clients.",
       children:[
         { label:'SALES' },
         { label:'MARKETING/PR' },
         { label:'COMMUNICATIONS',
           copy:"All companies communicate with their employees and clients on a regular basis. To the clients we work with, the way they communicate is almost as important as what they are communicating. Interactive media is a great way to deliver company memos, annual reports, employee orientation materials, press, news and other important information." },
         { label:'TRAINING' },
     ]},
     { label:'TYPES OF DELIVERY',
       children:[
         { label:'WEBSITES' },
         { label:'INTRANET SITES' },
         { label:'LAPTOP PRESENTATIONS' },
         { label:'CD-ROMS' },
     ]},
 ]},
 { label:'HOW WE DO IT',      /* [edit] children are stand-ins */
   children:[
     { label:'OUR PROCESS' },
     { label:'TECHNOLOGY' },
     { label:'AWARDS' },
 ]},
 { label:'OUR PORTFOLIO',
   children:[
     { label:'BY CLIENT (A-Z)',    layout:'client'  },
     { label:'BY CHRONOLOGY',      layout:'chrono'  },
     { label:'BY PROJECT TYPE',    layout:'type'    },
     { label:'BY DELIVERY MEDIA',  layout:'media'   },
     { label:'BY THUMBNAIL',       layout:'scatter' },
 ]},
 { label:'FIRSTBORN IS 5!', red:true,
   copy:"Five years of hard work, determination and a strong desire to create the best user experiences possible." },
 { label:'CONTACT US',
   copy:"Thinking about working with Firstborn? We'd love to hear from you." },
];

/* =====================================================================
   CONSTANTS — verbatim from the decompiled main.swf (fb 2003):
     speed=3 @ 60fps, navSpace=8, mLeading=8, sLeading=8,
     mainOffset=-14, horOffset=22,
     grey=0x999999 black=0x333333 red=0xFF0000,
     scale ladder: containers ×0.75/level, newcomers at 133,
     logo: 66.5 home → 29.7 open, siblings 75 / selected 100 / leaf 133,
     content scale-pops 0→100 at speed/2, subsub flies in from x=400.
   ===================================================================== */
const K = {
  speed: 3, navSpace: 8, mLeading: 8, sLeading: 8,
  mainOffset: -14, horOffset: 22,
  grey:'#999999', black:'#4a4a4a', red:'#e03a30', hover:'#ece9e3',
  anchorX: 0.155, anchorY: 0.40,
  ladder: 0.75, newcomer: 133,
  logoHome: 66.5, logoOpen: 29.7,
  sibling: 75, selected: 100, leaf: 133,
  subsubFlyX: 400,
};
/* note: original "black" was 0x333333 — nearly invisible on pure black,
   the site bg was #000 with items over imagery; nudged to #4a4a4a. */

const P = { mode:'fb03', speed:3, k:130, c:16, repel:120 };

/* ===== scaleEase / easeIn — the decompiled primitives, verbatim ===== */
function scaleEase(o, dt60){       // o:{s, goal, speed?}
  const mod = o.speed || P.speed;
  const diff = o.goal - o.s;
  if (P.mode==='fb03'){
    if (Math.abs(diff) > 1) o.s += (diff/mod)*dt60;
    else o.s = o.goal;
  } else {                          // spring A/B mode
    o.vs=(o.vs||0); const f=diff*P.k*0.06;
    o.vs=(o.vs+f*dt60)*Math.max(0,1-P.c*0.016*dt60);
    o.s+=o.vs*dt60*0.06*10;
    if (Math.abs(diff)<0.5 && Math.abs(o.vs)<0.5){ o.s=o.goal; o.vs=0; }
  }
}
function easeIn(o, prop, goal, dt60){
  const diff = goal - o[prop];
  if (P.mode==='fb03'){
    if (Math.abs(diff) > 1) o[prop] += (diff/P.speed)*dt60;
    else o[prop] = goal;
  } else {
    const vk='v'+prop; o[vk]=(o[vk]||0);
    const f=diff*P.k*0.06;
    o[vk]=(o[vk]+f*dt60)*Math.max(0,1-P.c*0.016*dt60);
    o[prop]+=o[vk]*dt60*0.06*10;
    if (Math.abs(diff)<0.5 && Math.abs(o[vk])<0.5){ o[prop]=goal; o[vk]=0; }
  }
}

/* ===== nav objects =====
   logo, main (container), main items, sub (container), sub items,
   subsub (container), subsub items, content. Each: {el,x,y,s,goal,w,h}
   Containers nest in the DOM so scaling composes exactly like Flash. */
const navEl = document.getElementById('nav');
const logoEl = document.getElementById('logo');
const mainEl = document.getElementById('main');
const contentEl = document.getElementById('content');

const logo = { el:logoEl, x:0, y:0, s:0, goal:100 };
const main = { el:mainEl, x:0, y:0, s:0, goal:100 };
let mains=[], sub=null, subs=[], subsub=null, subsubs=[];
let mSel=-1, sSel=-1, ssSel=-1;           // selected indices
let clickMode='logo', contentPending=null, contentShown=null;
const content = { el:contentEl, x:0, y:0, s:0, goal:0, speed: K.speed/2 };

function makeItem(node, parentEl, onClick){
  const el=document.createElement('div');
  el.className='it'; el.textContent=node.label;
  el.style.color = node.red ? K.red : K.grey;
  parentEl.appendChild(el);
  const o={ el, node, x:0, y:0, s:0, goal:100, w:0, h:0, baseColor: node.red?K.red:K.grey };
  o.w=el.offsetWidth; o.h=el.offsetHeight;
  el.addEventListener('click', e=>{ e.stopPropagation(); onClick(o); });
  el.addEventListener('pointerenter', ()=> el.style.color=K.hover);
  el.addEventListener('pointerleave', ()=> el.style.color=o.baseColor);
  return o;
}
function setColor(o,c){ o.baseColor=c; o.el.style.color=c; }

/* ===== build (mirrors buildMainNav / buildSubNav / buildSubSubNav) ===== */
function buildMain(){
  mains = TREE.map((n,i)=> makeItem(n, mainEl, ()=>mainRelease(i)));
  // right-align: xGoal = -width (items tuck left so right edges meet origin)
  mains.forEach((o,i)=>{ o.x=0; o.xGoal=-o.w; o.y=0; o.s=100; });
  placeMainNav();
  logo.s=0; logo.goal=K.logoHome;
  main.s=0; main.goal=100;
}
function buildSub(node){
  removeBox(sub, subs); removeBox(subsub, subsubs); subsub=null; subsubs=[];
  const el=document.createElement('div'); el.className='box'; mainEl.appendChild(el);
  const mo=mains[mSel];
  sub={ el, x:0, y: mo.y + mo.h + K.sLeading, s:0, goal:K.newcomer };
  subs=(node.children||[]).map((n,i)=> makeItem(n, el, ()=>subRelease(i)));
  subs.forEach(o=>{ o.s=100; });   // items live at full scale; the CONTAINER grows in
  chainYs(subs);
  apply(sub);
}
function buildSubSub(node){
  removeBox(subsub, subsubs);
  const el=document.createElement('div'); el.className='box'; sub.el.appendChild(el);
  subsub={ el, x:K.subsubFlyX, y:0, s:0, goal:K.newcomer, xGoal:0 };
  subsubs=(node.children||[]).map((n,i)=> makeItem(n, el, ()=>subsubRelease(i)));
  subsubs.forEach(o=>{ o.s=100; });
  chainYs(subsubs);
  apply(subsub);
}
function removeBox(box, items){ if(box){ box.el.remove(); } items.length=0; }

/* placeMainNav — verbatim splice logic (evaluated at click time,
   when the fresh sub block still has ~zero height — so the main stack
   stays tight, exactly like the original) */
function placeMainNav(){
  for(let i=1;i<mains.length;i++)
    mains[i].y = mains[i-1].y + mains[i-1].h*(mains[i-1].s/100) + K.mLeading;
}
function chainYs(items){
  for(let i=1;i<items.length;i++)
    items[i].y = items[i-1].y + items[i-1].h*(items[i-1].s/100) + K.navSpace;
}

/* ===== the switch functions — goals verbatim from the decompile ===== */
function scaleNavObj(l,m,s,ss){
  logo.goal=l; main.goal=m;
  if(sub) sub.goal=s;
  if(subsub) subsub.goal=ss;
}
function logoRelease(){
  clickMode='logo'; mSel=-1; sSel=-1; ssSel=-1;
  removeBox(sub,subs); sub=null; removeBox(subsub,subsubs); subsub=null;
  scaleNavObj(K.logoHome, 100, 0, 0);
  mains.forEach(o=>{ o.goal=100; o.xGoal=-o.w; setColor(o, o.node.red?K.red:K.grey); });
  placeMainNav();
  removeContent(); setFieldMood('home');
}
function mainRelease(i){
  const node=TREE[i];
  if (mSel===i && node.children){ logoRelease(); return; }   // toggle shut
  mSel=i; sSel=-1; ssSel=-1; clickMode='main';
  removeContent();
  scaleNavObj(K.logoOpen, K.ladder*100, 0, 0);
  mains.forEach((o,j)=>{
    o.goal = j===i ? K.selected : K.sibling;
    o.xGoal = j===i ? K.mainOffset : -o.w;
    setColor(o, j===i ? (node.red?K.red:K.black) : (o.node.red?K.red:K.grey));
  });
  if (node.children){ buildSub(node); sub.goal=K.newcomer; }
  else { mains[i].goal=K.leaf; }
  placeMainNav();
  contentPending = node.copy ? {node, at:'main'} : null;
  setFieldMood(node.label==='OUR PORTFOLIO' ? 'portfolio' : 'dim');
}
function subRelease(i){
  const node=TREE[mSel].children[i];
  sSel=i; ssSel=-1; clickMode='sub';
  removeContent();
  subs.forEach((o,j)=>{
    setColor(o, j===i ? K.black : K.grey);
    o.goal = j===i ? (node.children?K.selected:K.leaf) : K.sibling;
  });
  if (node.children){
    scaleNavObj(K.logoOpen, K.ladder*K.ladder*100, K.newcomer, 0);
    buildSubSub(node);
    subsub.goal=K.newcomer;
  } else {
    scaleNavObj(K.logoOpen, K.ladder*K.ladder*100, K.newcomer, 0);
    removeBox(subsub,subsubs); subsub=null;
  }
  if (node.layout){ curLayout=node.layout; layouts[curLayout](); setFieldMood('portfolio'); }
  else if (TREE[mSel].label!=='OUR PORTFOLIO') setFieldMood('dim');
  contentPending = node.copy ? {node, at:'sub'} : null;
}
function subsubRelease(i){
  const node=TREE[mSel].children[sSel].children[i];
  ssSel=i; clickMode='subsub';
  removeContent();
  scaleNavObj(K.logoOpen, K.ladder*K.ladder*K.ladder*100, K.newcomer, K.newcomer);
  subsubs.forEach((o,j)=>{
    setColor(o, j===i ? K.black : K.grey);
    o.goal = j===i ? K.leaf : K.sibling;
  });
  contentPending = node.copy ? {node, at:'subsub'} : null;
}

/* ===== content (addContent/removeContent: scale pop, speed/2) ===== */
function removeContent(){ content.goal=0; contentShown=null; }
function addContent(pend){
  contentEl.textContent = pend.node.copy;
  // place beside/below the deepest column, in nav-local coords
  let x=0,y=0;
  if (pend.at==='subsub' && subsub){
    x = subXAbs() + (subsub.xGoal ?? subsub.x)*absScale(sub)/100 + 10;
    y = subYAbs() + (subsub.y + colH(subsubs)*(subsub.s/100))*absScale(sub)/100 + 14;
  } else if (pend.at==='sub' && sub){
    x = subXAbs() + 6;
    y = subYAbs() + colH(subs)*absScale(sub)/100 + 14;
  } else {
    x = main.x + 6; y = main.y + colH(mains)*(main.s/100) + 16;
  }
  content.x=x; content.y=y; content.s=0; content.goal=100;
  contentShown=pend.node;
}
const absScale = box => (main.s/100)*(box?box.s:100);
const subXAbs = ()=> main.x + (sub? sub.x*(main.s/100):0);
const subYAbs = ()=> main.y + (sub? sub.y*(main.s/100):0);
const colH = items => items.length? items[items.length-1].y + items[items.length-1].h*(items[items.length-1].s/100) : 0;

/* ===== apply transforms ===== */
function apply(o){
  o.el.style.transform = 'translate('+o.x+'px,'+o.y+'px) scale('+(Math.max(0,o.s)/100)+')';
}

/* ===== navRun — the master tick, 60Hz fixed-step like the SWF ===== */
function navTick(dt60){
  scaleEase(logo, dt60); scaleEase(main, dt60);
  mains.forEach(o=>{ scaleEase(o,dt60); easeIn(o,'x',o.xGoal,dt60); });
  if (sub){ scaleEase(sub,dt60); subs.forEach(o=>scaleEase(o,dt60)); chainYs(subs); }
  if (subsub){ scaleEase(subsub,dt60); easeIn(subsub,'x',subsub.xGoal,dt60);
    subsubs.forEach(o=>scaleEase(o,dt60)); chainYs(subsubs);
    // subsub container y chains under the selected sub item, live (navRun verbatim)
    if (sSel>=0 && subs[sSel]) subsub.y = subs[sSel].y + subs[sSel].h*(subs[sSel].s/100) + K.navSpace;
    if (sSel>=0 && subs[sSel]) subsub.xGoal = subs[sSel].x + subs[sSel].w - K.horOffset;
    // sub items after the selected re-chain below the subsub block, live
    for(let i=sSel+1;i<subs.length;i++){
      const prev = i===sSel+1
        ? { y: subsub.y + colH(subsubs)*(subsub.s/100), h:0, s:100 }
        : subs[i-1];
      subs[i].y = prev.y + prev.h*(prev.s/100) + K.navSpace;
    }
  }
  scaleEase(content, dt60);
  // threshold choreography: content pops once the nav has settled
  if (contentPending){
    const settled = atGoal(logo)&&atGoal(main)&&mains.every(atGoal)
      && (!sub || (atGoal(sub)&&subs.every(atGoal)))
      && (!subsub || (atGoal(subsub)&&subsubs.every(atGoal)));
    if (settled){ addContent(contentPending); contentPending=null; }
  }
  // render
  apply(logo); apply(main); mains.forEach(apply);
  if (sub){ apply(sub); subs.forEach(apply); }
  if (subsub){ apply(subsub); subsubs.forEach(apply); }
  apply(content);
}
const atGoal = o => o.s===o.goal;

/* ===== anchor + showAll-style stage scaling (like the SWF embed) ===== */
function anchorNav(){
  navEl.style.left = (innerWidth*K.anchorX)+'px';
  navEl.style.top  = (innerHeight*K.anchorY)+'px';
  const k = Math.min(Math.max(Math.min(innerWidth/1100, innerHeight/760), 0.85), 1.8);
  navEl.style.transform = 'scale('+k+')';
  navEl.style.transformOrigin = '0 0';
  logo.x=0; logo.y=-46;
  main.x = 10; main.y = 0;   // main origin ≈ logo right edge region; items right-align INTO it
}

/* =====================================================================
   the thumbnail field (unchanged from v2)
   ===================================================================== */
const IDS = ['012','014','016','018','020','022','024','026','028','030','032','034','036','038','040',
'042','044','046','048','050','052','054','056','058','060','062','064','066','070','072','074','076',
'078','080','082','084','086','088','090','092','094','096','098','100','102','104','106','108','110',
'112','114','116','118','122','124','126','128','130','132','134','136','138','146','148','150','152',
'154','156','158','160','162','164','166','170','172','174','178','184','186','188','190','196','198',
'200','202','204','206','208','212','216','218','220','222','224','226','228','230','232','234','236',
'238','240','242','244','248','250','254','256','258'];
const TW = 66, TH = 31;
const cv = document.getElementById('field'), cx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cx.setTransform(DPR,0,0,DPR,0,0);
  anchorNav();
}
addEventListener('resize', ()=>{ resize(); layouts[curLayout](); });

let seed = 20031107;
const rnd = () => (seed = (seed*1664525+1013904223)>>>0, seed/4294967296);
const parts = IDS.map((id,i)=>{
  const img = new Image(); img.src = 'assets/t'+id+'.jpg';
  return { img, i, x:0, y:0, vx:0, vy:0, hx:0, hy:0, b:0.2, s:1 };
});
function safeZone(x,y){ return x > 0.06*W && x < 0.42*W && y > 0.22*H && y < 0.8*H; }
const layouts = {
  scatter(){ parts.forEach(p=>{
    let x,y,tries=0;
    do { x=30+rnd()*(W-60); y=60+rnd()*(H-120); tries++; } while (safeZone(x,y)&&tries<40);
    p.hx=x; p.hy=y; });},
  client(){ grid(parts.slice().sort((a,b)=>a.i-b.i)); },
  chrono(){ grid(parts.slice().sort((a,b)=>b.i-a.i)); },
  type(){ const KC=5, cs=[];
    for(let k=0;k<KC;k++) cs.push([0.5*W+rnd()*0.44*W, 0.16*H+rnd()*0.68*H]);
    parts.forEach((p,j)=>{ const c=cs[j%KC];
      const a=rnd()*Math.PI*2, r=Math.sqrt(rnd())*Math.min(W,H)*0.12;
      p.hx=c[0]+Math.cos(a)*r; p.hy=c[1]+Math.sin(a)*r; }); },
  media(){ const rows=4;
    parts.forEach((p,j)=>{ const r=j%rows, n=Math.ceil(parts.length/rows), k=Math.floor(j/rows);
      p.hx = 0.48*W + (k/(n-1))*0.48*W;
      p.hy = 0.22*H + r*(0.56*H/(rows-1)) + (rnd()-0.5)*8; }); },
};
function grid(sorted){
  const cols = Math.max(6, Math.round(Math.sqrt(sorted.length*(W*0.48)/(H*0.7)/(TW/TH))));
  const rows = Math.ceil(sorted.length/cols);
  const gw = Math.min(0.48*W, cols*(TW+10)), gh = Math.min(0.72*H, rows*(TH+10));
  const x0 = 0.5*W, y0 = (H-gh)/2;
  sorted.forEach((p,j)=>{
    p.hx = x0 + (j%cols)*(gw/(cols-1||1));
    p.hy = y0 + Math.floor(j/cols)*(gh/(rows-1||1)); });
}
let curLayout='scatter';
resize();
layouts.scatter();
parts.forEach(p=>{ p.x=p.hx; p.y=p.hy; });

let fieldMood='home';
function setFieldMood(m){ fieldMood=m; }
const moodBase = ()=> fieldMood==='dim' ? 0.05 : (fieldMood==='portfolio' ? 0.26 : 0.18);

const mouse = { x:-9e3, y:-9e3 };
addEventListener('pointermove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
addEventListener('pointerleave', ()=>{ mouse.x=-9e3; mouse.y=-9e3; });
const easeOut = t => 1-Math.pow(1-t,3);

function fieldTick(dt){
  const t = performance.now()/1000;
  cx.clearRect(0,0,W,H);
  const base = moodBase();
  for(const p of parts){
    const dx0=Math.sin(t*0.35+p.i*1.7)*7, dy0=Math.cos(t*0.28+p.i*2.3)*5;
    const tx=p.hx+dx0, ty=p.hy+dy0;
    if (P.mode==='spring'){
      let fx=(tx-p.x)*Math.min(P.k,140), fy=(ty-p.y)*Math.min(P.k,140);
      const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md=Math.hypot(mdx,mdy);
      if (fieldMood!=='dim' && md<P.repel && md>0.01){
        const f=(1-md/P.repel)*2600; fx+=mdx/md*f; fy+=mdy/md*f;
      }
      p.vx=(p.vx+fx*dt)*Math.max(0,1-Math.min(P.c,16)*dt);
      p.vy=(p.vy+fy*dt)*Math.max(0,1-Math.min(P.c,16)*dt);
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    } else {   // '03 mode: easeIn on positions, mouse repel nudges the goal
      let gx=tx, gy=ty;
      const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md=Math.hypot(mdx,mdy);
      if (fieldMood!=='dim' && md<P.repel && md>0.01){
        const push=(1-md/P.repel)*60; gx+=mdx/md*push; gy+=mdy/md*push;
      }
      p.x += (gx-p.x)/(P.speed*2) * dt*60;
      p.y += (gy-p.y)/(P.speed*2) * dt*60;
    }
    const md=Math.hypot(p.x-mouse.x,p.y-mouse.y);
    const near=fieldMood==='dim'?0:Math.max(0,1-md/170);
    const tb=base+easeOut(near)*(1-base), ts=1+easeOut(near)*0.55;
    p.b+=(tb-p.b)*Math.min(1,10*dt);
    p.s+=(ts-p.s)*Math.min(1,10*dt);
    if (p.img.complete&&p.img.naturalWidth){
      const w=TW*p.s, h=TH*p.s;
      cx.globalAlpha=p.b;
      cx.drawImage(p.img,p.x-w/2,p.y-h/2,w,h);
    }
  }
  cx.globalAlpha=1;
}

/* ===== master loop: fixed 60Hz for the nav (like the SWF), dt for field ===== */
let last = performance.now(), acc = 0;
function frame(now){
  let dt = Math.min(0.05,(now-last)/1000); last=now;
  acc += dt;
  const STEP = 1/60;
  let n = 0;
  while (acc >= STEP && n < 5){ navTick(1); acc -= STEP; n++; }
  fieldTick(dt);
  requestAnimationFrame(frame);
}

/* ===== boot ===== */
buildMain();
logoEl.addEventListener('click', logoRelease);
requestAnimationFrame(frame);

/* ===== controls ===== */
document.querySelectorAll('#mode b').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#mode b').forEach(o=>o.classList.remove('on'));
    b.classList.add('on'); P.mode=b.dataset.m;
  });
});
const bind=(id,key)=>{
  const el=document.getElementById(id), v=document.getElementById(id+'V');
  el.addEventListener('input', ()=>{ P[key]=+el.value; v.textContent=el.value; });
};
bind('speed','speed'); bind('stiff','k'); bind('repel','repel');
</script>
