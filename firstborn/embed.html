<!doctype html><html><head><meta charset="utf-8">
<style>html,body{margin:0;height:100%;background:#000;overflow:hidden}</style></head>
<body>
<script src="ruffle/ruffle.js"></script>
<script>
window.RufflePlayer=window.RufflePlayer||{};
const r=window.RufflePlayer.newest();
const player=r.createPlayer();
player.style.width='100%'; player.style.height='100%';
document.body.appendChild(player);
player.load({url:'swf/firstborn-2003.swf', parameters:'siteSize=1', autoplay:'on',
  scale:'showAll', letterbox:'on', preferredRenderer:'canvas',
  backgroundColor:'#000000', allowScriptAccess:true});
</script></body></html>
